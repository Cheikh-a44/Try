<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Releve de Notes - PPV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root { --primary: #2c5f2d; --primary-light: #e8f5e9; --light: #f5f7fa; --white: #ffffff; --text: #333333; --shadow: 0 2px 8px rgba(0,0,0,0.1); --radius: 8px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:var(--light); color:var(--text); line-height:1.2; }
  header { background:linear-gradient(135deg,var(--primary),#1e4420); color:var(--white); padding:1.5rem 1rem; text-align:center; }
  .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
  .card { background:var(--white); border-radius:var(--radius); padding:1rem; margin:0.5rem 0; box-shadow:var(--shadow); }
  .admin-btn { padding:0.6rem 1.2rem; border:none; border-radius:var(--radius); font-size:0.9rem; font-weight:500; cursor:pointer; background:var(--primary); color:white; }
  .admin-btn:hover { background:#1e4420; }
  .student-header { text-align:center; margin-bottom:1rem; padding-bottom:0.8rem; border-bottom:1px solid #ddd; }
  .student-header h3 { font-size:1.2rem; font-weight:500; }
  .releve-table { width:100%; border-collapse:collapse; margin:0.5rem 0; font-size:12px; }
  .releve-table th { border:1px solid #aaa; padding:2px 3px; background:var(--primary-light); font-weight:500; }
  .releve-table td { padding:1px 3px; }
  .releve-table tbody tr:not(.module-row):not(.student-info-row):not(.moyenne-row) td { border:1px solid #aaa; }
  .releve-table .student-info-row { background:#f0f8ff; font-weight:500; }
  .releve-table .student-info-row td { border-top:1px solid #aaa; border-bottom:1px solid #aaa; border-left:none; border-right:none; padding:2px 3px; }
  .releve-table .student-info-row td:first-child { border-left:1px solid #aaa; }
  .releve-table .student-info-row td:last-child { border-right:1px solid #aaa; }
  .releve-table .module-row { background:#d4edda; font-weight:500; }
  .releve-table .module-row td { border-top:1px solid #aaa; border-bottom:1px solid #aaa; border-left:none; border-right:none; padding:2px 3px; }
  .releve-table .module-row td:first-child { border-left:1px solid #aaa; }
  .releve-table .module-row td:last-child { border-right:1px solid #aaa; }
  .releve-table .subject-row td:first-child { text-align:left; padding-left:15px; }
  .status-C, .status-V { color:#27ae60; }
  .status-NC, .status-NV { color:#e74c3c; }
  .moyenne-row td { border:none !important; padding:4px 3px 2px; }
  .empty-state { text-align:center; padding:2rem; }
  .footer { text-align:center; padding:1.5rem; color:#666; font-size:0.8rem; }
</style>
</head>
<body>
<header><div class="container"><h1>PPV - Releve de Notes</h1><p>Document officiel des resultats academiques</p></div></header>
<div class="container"><div id="studentView" class="card"><div id="studentResults"><div style="text-align:center; padding:2rem;">Chargement...</div></div><div id="pdfButtonContainer" style="text-align:center; margin-top:1rem;"></div></div></div>
<footer class="footer"><p>© 2026 Departement de Production et Protection Vegetales</p></footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, child, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const firebaseConfig = { apiKey: "AIzaSyDnrW6WnmbEFpbWzlW9IGglxAafajt2Kyo", authDomain: "iset-b9974.firebaseapp.com", projectId: "iset-b9974", storageBucket: "iset-b9974.firebasestorage.app", messagingSenderId: "1054170284751", appId: "1:1054170284751:web:8f02232478430d5ae2adba", databaseURL: "https://iset-b9974-default-rtdb.firebaseio.com/" };
  const app = initializeApp(firebaseConfig); const db = getDatabase(app);
  
  const NO_TP = ["Anglais","Anglais_2","Francais","Francais_2","Francais_s3","Math_et_Statistique","Economie","Vulgarisation"];
  const MODULES = { PPV: { S3: { M31:{name:"Langue et economie",credit:6,subjects:["Francais_s3","Economie"]}, M32:{name:"Principes d'agronomie",credit:8,subjects:["I_Agronomie","I_Horticulture"]}, M33:{name:"Phytoprotection 1",credit:8,subjects:["Pesticides_agricoles","Entomologie_et_Nemato"]}, M34:{name:"Sciences du sol et des plantes",credit:8,subjects:["Science_des_sols","Science_des_plantes"]} }, S4: { M41:{name:"Vulgarisation",credit:3,subjects:["Vulgarisation"]}, M42:{name:"Techniques culturales",credit:7,subjects:["Technique_de_propagation","Technique_d_irrigation_et_BEC"]}, M43:{name:"Physiologie et fertilite",credit:7,subjects:["Ecophysiologie_et_Biochimie","Fertilite_du_sol"]}, M44:{name:"Protection des vegetaux",credit:6,subjects:["Methodes_de_diagnostic","Malherbologie"]} } } };
  const CREDITS = { PPV: { S3:{"Francais_s3":3,"Economie":3,"I_Agronomie":4,"I_Horticulture":4,"Pesticides_agricoles":4,"Entomologie_et_Nemato":4,"Science_des_sols":4,"Science_des_plantes":4}, S4:{"Vulgarisation":3,"Technique_de_propagation":4,"Technique_d_irrigation_et_BEC":3,"Ecophysiologie_et_Biochimie":4,"Fertilite_du_sol":3,"Methodes_de_diagnostic":3,"Malherbologie":3} } };
  
  function hasTP(s){ return !NO_TP.includes(s); }
  function display(s){ return s.replace(/_/g,' ').replace(/I_/g,'I.').replace(/et_/g,'et '); }
  function escapeHtml(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  
  let currentData=null, currentId=null, currentDept=null, currentSem=null, currentName='';
  
  function calculate(notes,dept,sem){
    const mods=MODULES[dept]?.[sem]; if(!mods) return null;
    const req=[]; for(let m in mods) for(let s of mods[m].subjects) if(!req.includes(s)) req.push(s);
    const subjAvg={}, subjStatus={}, subjSR={};
    for(let s of req){ const n=notes[s]||{}; const exam=n['Examen']||0, cc=n['Controle continu']||n['Contrôle continu']||0, tp=n['TP']||0, ratt=n['Rattrapage']; const useSR=ratt!==undefined&&ratt>exam; subjSR[s]=useSR; const final=useSR?ratt:exam; subjAvg[s]=hasTP(s)?(tp+cc*2+final*3)/6:(cc*2+final*3)/5; subjStatus[s]=subjAvg[s]>=10?'C':'NC'; }
    const modAvg={}, modStatus={}, modCredits={};
    for(let m in mods){ let w=0,c=0,earned=0; for(let s of mods[m].subjects){ const cr=CREDITS[dept][sem][s]||3; w+=(subjAvg[s]||0)*cr; c+=cr; if(subjStatus[s]==='C') earned+=cr; } modAvg[m]=c>0?w/c:0; modStatus[m]=mods[m].subjects.every(s=>subjStatus[s]==='C')&&modAvg[m]>=10?'V':'NV'; modCredits[m]=earned; }
    let tw=0,tc=0; for(let s of req){ const cr=CREDITS[dept][sem][s]||3; tw+=(subjAvg[s]||0)*cr; tc+=cr; } const genMoy=tc>0?tw/tc:0;
    const hasNV=Object.values(modStatus).some(s=>s==='NV'); const semStatus=hasNV?'Non Valide':(genMoy>=10?'Valide':'Non Valide'); const hasSR=Object.values(subjSR).some(v=>v);
    return { genMoy, semStatus, modStatus, modCredits, modAvg, subjAvg, subjStatus, hasSR, modules:mods };
  }
  
  async function load(){
    const p=new URLSearchParams(window.location.search); const dept=p.get('dept'), sem=p.get('sem'), id=p.get('id'), name=p.get('name');
    if(!dept||!sem||!id){ document.getElementById('studentResults').innerHTML='<div class="empty-state"><h3>Lien invalide</h3></div>'; return; }
    currentDept=dept; currentSem=sem; currentId=id; currentName=name?decodeURIComponent(name):'';
    try{
      const snap=await get(child(ref(db),`results/${dept}/${sem}/${id}`)); if(!snap.exists()){ document.getElementById('studentResults').innerHTML='<div class="empty-state"><h3>Aucun resultat</h3></div>'; return; }
      const data=snap.val(); if(!currentName) for(let k in data) if(data[k].name){ currentName=data[k].name; break; }
      const notes={}; for(let k in data){ const d=data[k]; if(!notes[d.subject]) notes[d.subject]={}; notes[d.subject][d.type]=d.grade; }
      const mods=MODULES[dept]?.[sem]; let complete=mods&&Object.keys(mods).length>0;
      if(mods){ for(let m in mods) for(let s of mods[m].subjects){ const htp=hasTP(s); if(!notes[s]?.['Examen']||!notes[s]?.['Controle continu']||(htp&&!notes[s]?.['TP'])){ complete=false; break; } } }
      currentData={name:currentName, grades:notes};
      if(complete&&mods){
        const res=calculate(notes,dept,sem); currentData.results=res; const showSR=res.hasSR;
        let html=`<div class="student-header"><h3>${escapeHtml(currentName)}</h3><p>N° ${escapeHtml(id)} | PPV | ${escapeHtml(sem)}</p></div><div style="overflow-x:auto;"><table class="releve-table"><thead><tr><th>Numero</th><th>Nom et Prenom</th><th>TP</th><th>CC</th><th>Examen</th>${showSR?'<th>SR</th>':''}<th>NFe</th><th>Credit</th><th>Obs</th></tr></thead><tbody>`;
        html+=`<tr class="student-info-row"><td>${escapeHtml(id)}</td><td style="text-align:left;">${escapeHtml(currentName)}</td><td></td><td></td><td></td>${showSR?'<td></td>':''}<td></td><td></td><td></td></tr>`;
        for(let m in res.modules){ const mod=res.modules[m]; html+=`<tr class="module-row"><td>${m}</td><td style="text-align:left;">${mod.name}</td><td></td><td></td><td></td>${showSR?'<td></td>':''}<td style="font-weight:500;">${res.modAvg[m].toFixed(2)}</td><td>${res.modCredits[m].toFixed(1)}</td><td class="${res.modStatus[m]==='V'?'status-V':'status-NV'}">${res.modStatus[m]}</td></tr>`;
          for(let s of mod.subjects){ const g=notes[s]||{}; const tp=hasTP(s)?(g['TP']?.toFixed(2)||''):''; const cc=g['Controle continu']?.toFixed(2)||g['Contrôle continu']?.toFixed(2)||''; const exam=g['Examen']?.toFixed(2)||''; const ratt=g['Rattrapage']; const sr=(ratt!==undefined&&ratt>(g['Examen']||0))?ratt.toFixed(2):''; const cr=CREDITS.PPV[sem][s]||3;
            html+=`<tr><td></td><td style="text-align:left; padding-left:15px;">${display(s)}</td><td>${tp}</td><td>${cc}</td><td>${exam}</td>${showSR?`<td>${sr}</td>`:''}<td style="font-weight:500;">${res.subjAvg[s].toFixed(2)}</td><td>${cr.toFixed(1)}</td><td class="${res.subjStatus[s]==='C'?'status-C':'status-NC'}">${res.subjStatus[s]}</td></tr>`; } }
        const colspan=showSR?6:5; html+=`<tr class="moyenne-row"><td colspan="${colspan}" style="text-align:right; font-weight:500;">Moyenne Semestre :</td><td style="font-weight:500;">${res.genMoy.toFixed(2)}</td><td></td><td class="${res.semStatus==='Valide'?'status-V':'status-NV'}" style="font-weight:500;">${res.semStatus}</td></tr></tbody></table></div>`;
        document.getElementById('studentResults').innerHTML=html;
        document.getElementById('pdfButtonContainer').innerHTML=`<button class="admin-btn" onclick="window.generatePDF()">Telecharger mon releve PDF</button>`;
      } else { document.getElementById('studentResults').innerHTML=`<div class="student-header"><h3>${escapeHtml(currentName)}</h3><p>N° ${escapeHtml(id)} | PPV | ${escapeHtml(sem)}</p></div><div style="text-align:center; padding:1rem;">Resultats non finalises</div>`; }
    }catch(e){ document.getElementById('studentResults').innerHTML='<div class="empty-state"><h3>Erreur</h3></div>'; }
  }
  
  window.generatePDF=function(){
    if(!currentData||!currentData.results){ alert("Resultats incomplets"); return; }
    const res=currentData.results, name=currentData.name, showSR=res.hasSR, colspan=showSR?6:5;
    let content=`<div style="padding:10mm 8mm; font-family:Arial,sans-serif; font-size:10pt;"><div style="font-weight:bold; font-size:11pt;">Institut Superieur d'Enseignement Technologique de Rosso</div><div style="display:flex; justify-content:space-between;"><span style="font-weight:bold;">Resultats du ${currentSem}</span><span>Annee : 2025-2026</span></div><div><span style="font-weight:bold;">Filiere :</span> L2PPV-L2 Licence PPV</div><table style="width:100%; border-collapse:collapse; border:1px solid #000; margin-top:8px;"><thead><tr style="background:#e8f4fc;"><th style="border:1px solid #000; padding:2px;">Numero</th><th style="border:1px solid #000; padding:2px;">Nom et Prenom</th><th style="border:1px solid #000; padding:2px;">TP</th><th style="border:1px solid #000; padding:2px;">CC</th><th style="border:1px solid #000; padding:2px;">Examen</th>${showSR?'<th style="border:1px solid #000; padding:2px;">SR</th>':''}<th style="border:1px solid #000; padding:2px;">NFe</th><th style="border:1px solid #000; padding:2px;">Credit</th><th style="border:1px solid #000; padding:2px;">Obs</th></tr></thead><tbody>`;
    content+=`<tr style="background:#f0f8ff;"><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; border-left:1px solid #000; border-right:1px solid #000; padding:2px;">${escapeHtml(currentId)}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;">${escapeHtml(name)}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td>${showSR?'<td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td>':''}<td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; border-right:1px solid #000; padding:2px;"></td></tr>`;
    for(let m in res.modules){ const mod=res.modules[m]; content+=`<tr style="background:#d4edda;"><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; border-left:1px solid #000; padding:2px;">${m}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;">${mod.name}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td>${showSR?'<td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;"></td>':''}<td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px; font-weight:bold;">${res.modAvg[m].toFixed(2)}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; padding:2px;">${res.modCredits[m].toFixed(1)}</td><td style="border:none; border-top:1px solid #000; border-bottom:1px solid #000; border-right:1px solid #000; padding:2px;">${res.modStatus[m]}</td></tr>`;
      for(let s of mod.subjects){ const g=currentData.grades[s]||{}; const tp=hasTP(s)?(g['TP']?.toFixed(2)||''):''; const cc=g['Controle continu']?.toFixed(2)||g['Contrôle continu']?.toFixed(2)||''; const exam=g['Examen']?.toFixed(2)||''; const ratt=g['Rattrapage']; const sr=(ratt!==undefined&&ratt>(g['Examen']||0))?ratt.toFixed(2):''; const cr=CREDITS.PPV[currentSem][s]||3;
        content+=`<tr><td style="border:1px solid #000; padding:1px;"></td><td style="border:1px solid #000; padding:1px; padding-left:15px;">${display(s)}</td><td style="border:1px solid #000; padding:1px;">${tp}</td><td style="border:1px solid #000; padding:1px;">${cc}</td><td style="border:1px solid #000; padding:1px;">${exam}</td>${showSR?`<td style="border:1px solid #000; padding:1px;">${sr}</td>`:''}<td style="border:1px solid #000; padding:1px; font-weight:bold;">${res.subjAvg[s].toFixed(2)}</td><td style="border:1px solid #000; padding:1px;">${cr.toFixed(1)}</td><td style="border:1px solid #000; padding:1px;">${res.subjStatus[s]}</td></tr>`; } }
    content+=`<tr class="moyenne-row"><td colspan="${colspan}" style="border:none; padding:4px; text-align:right; font-weight:bold;">Moyenne Semestre :</td><td style="border:none; padding:4px; font-weight:bold;">${res.genMoy.toFixed(2)}</td><td style="border:none; padding:4px;"></td><td style="border:none; padding:4px; font-weight:bold;">${res.semStatus}</td></tr></tbody></table></div>`;
    const el=document.createElement('div'); el.innerHTML=content; document.body.appendChild(el);
    html2pdf().set({ margin:[3,3,3,3], filename:`Releve_${currentId}_${currentSem}.pdf` }).from(el).save().then(()=>document.body.removeChild(el));
  };
  
  load();
</script>
</body>
</html>
