<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Releve de Notes - PPV</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --primary: #2c5f2d;
    --light: #f5f7fa;
    --white: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --shadow: 0 2px 8px rgba(0,0,0,0.1);
    --radius: 6px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background:var(--light); 
    color:var(--text); 
    line-height:1.2;
  }
  header { 
    background:linear-gradient(135deg,var(--primary),#1e4420); 
    color:var(--white); 
    padding:1.5rem 1rem; 
    text-align:center; 
  }
  .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
  .card {
    background:var(--white);
    border-radius:var(--radius);
    padding:1rem;
    margin:0.5rem 0;
    box-shadow:var(--shadow);
  }
  .admin-btn {
    padding:0.6rem 1.2rem;
    border:none;
    border-radius:var(--radius);
    font-size:0.9rem;
    font-weight:500;
    cursor:pointer;
    background:var(--primary);
    color:white;
  }
  .admin-btn:hover { background:#1e4420; }
  
  .student-header { text-align:center; margin-bottom:1rem; padding-bottom:0.8rem; border-bottom:1px solid #ddd; }
  .student-header h3 { font-size:1.2rem; font-weight:500; }
  .student-header p { font-size:0.85rem; color:var(--text-light); }
  
  .releve-table {
    width:100%;
    border-collapse:collapse;
    margin:0.5rem 0;
    font-size:12px;
  }
  .releve-table th {
    border:1px solid #aaa;
    padding:3px 4px;
    background:#f0f0f0;
    font-weight:500;
  }
  .releve-table td { border:1px solid #aaa; padding:2px 4px; }
  .releve-table .module-row { background:#f8f9fa; font-weight:500; }
  .releve-table .student-info-row { background:#f0f8ff; }
  .status-C, .status-V { color:#27ae60; }
  .status-NC, .status-NV { color:#e74c3c; }
  .moyenne-row td { border:none !important; padding:6px 4px 2px; }
  
  .empty-state { text-align:center; padding:2rem 1rem; color:var(--text-light); }
  .neutral-message { text-align:center; padding:0.6rem; background:#e9ecef; border-radius:var(--radius); }
  .simple-table { width:100%; border-collapse:collapse; font-size:13px; }
  .simple-table th, .simple-table td { border:1px solid #ddd; padding:5px; }
  .simple-table th { background:#f0f0f0; }
  .section-subtitle { font-size:1rem; color:var(--primary); margin:0.8rem 0 0.3rem; border-bottom:1px solid #ddd; }
  
  .footer { text-align:center; padding:1.5rem; color:var(--text-light); font-size:0.8rem; }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>PPV - Releve de Notes</h1>
    <p>Document officiel des resultats academiques</p>
  </div>
</header>

<div class="container">
  <div id="studentView" class="card">
    <div id="studentResults"><div style="text-align:center; padding:2rem;">Chargement...</div></div>
    <div id="pdfButtonContainer" style="text-align:center; margin-top:1rem;"></div>
  </div>
</div>

<footer class="footer">
  <p>© 2026 Departement de Production et Protection Vegetales</p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, child, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDnrW6WnmbEFpbWzlW9IGglxAafajt2Kyo",
    authDomain: "iset-b9974.firebaseapp.com",
    projectId: "iset-b9974",
    storageBucket: "iset-b9974.firebasestorage.app",
    messagingSenderId: "1054170284751",
    appId: "1:1054170284751:web:8f02232478430d5ae2adba",
    databaseURL: "https://iset-b9974-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const SUBJECTS_WITHOUT_TP = ["Anglais", "Anglais_2", "Francais", "Francais_2", "Francais_s3", "Math_et_Statistique", "Economie", "Vulgarisation"];
  const MODULES_STRUCTURE = {
    PPV: {
      S3: { M31: { name: "Langue et economie", credit: 6.0, subjects: ["Francais_s3", "Economie"] }, M32: { name: "Principes d'agronomie", credit: 8.0, subjects: ["I_Agronomie", "I_Horticulture"] }, M33: { name: "Phytoprotection 1", credit: 8.0, subjects: ["Pesticides_agricoles", "Entomologie_et_Nemato"] }, M34: { name: "Sciences du sol et des plantes", credit: 8.0, subjects: ["Science_des_sols", "Science_des_plantes"] } },
      S4: { M41: { name: "Vulgarisation", credit: 3.0, subjects: ["Vulgarisation"] }, M42: { name: "Techniques culturales", credit: 7.0, subjects: ["Technique_de_propagation", "Technique_d_irrigation_et_BEC"] }, M43: { name: "Physiologie et fertilite", credit: 7.0, subjects: ["Ecophysiologie_et_Biochimie", "Fertilite_du_sol"] }, M44: { name: "Protection des vegetaux", credit: 6.0, subjects: ["Methodes_de_diagnostic", "Malherbologie"] } }
    }
  };
  const SUBJECT_CREDITS = {
    PPV: {
      S3: { "Francais_s3": 3.0, "Economie": 3.0, "I_Agronomie": 4.0, "I_Horticulture": 4.0, "Pesticides_agricoles": 4.0, "Entomologie_et_Nemato": 4.0, "Science_des_sols": 4.0, "Science_des_plantes": 4.0 },
      S4: { "Vulgarisation": 3.0, "Technique_de_propagation": 4.0, "Technique_d_irrigation_et_BEC": 3.0, "Ecophysiologie_et_Biochimie": 4.0, "Fertilite_du_sol": 3.0, "Methodes_de_diagnostic": 3.0, "Malherbologie": 3.0 }
    }
  };

  function hasTP(s) { return !SUBJECTS_WITHOUT_TP.includes(s); }
  function displaySubjectName(s) { return s.replace(/_/g, ' ').replace(/I_/g, 'I.').replace(/et_/g, 'et '); }
  function escapeHtml(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  let currentData = null, currentStudentId = null, currentDept = null, currentSemester = null, currentStudentName = '';

  function calculateResultsFromNotes(notesBySubject, dept, semester) {
    const modules = MODULES_STRUCTURE[dept]?.[semester];
    if (!modules) return null;
    
    const required = [];
    for (let m in modules) for (let s of modules[m].subjects) if (!required.includes(s)) required.push(s);
    
    const subjAvg = {}, subjStatus = {}, subjSR = {};
    for (let s of required) {
      const notes = notesBySubject[s] || {};
      const exam = notes['Examen'] || 0, cc = notes['Controle continu'] || notes['Contrôle continu'] || 0, tp = notes['TP'] || 0;
      const ratt = notes['Rattrapage'];
      const useSR = ratt !== undefined && ratt > exam;
      subjSR[s] = useSR;
      const final = useSR ? ratt : exam;
      subjAvg[s] = hasTP(s) ? (tp + cc * 2 + final * 3) / 6 : (cc * 2 + final * 3) / 5;
      subjStatus[s] = subjAvg[s] >= 10 ? 'C' : 'NC';
    }
    
    const modAvg = {}, modStatus = {}, modCredits = {};
    for (let m in modules) {
      let w = 0, c = 0, earned = 0;
      for (let s of modules[m].subjects) {
        const cr = SUBJECT_CREDITS[dept][semester][s] || 3;
        w += (subjAvg[s] || 0) * cr; c += cr;
        if (subjStatus[s] === 'C') earned += cr;
      }
      modAvg[m] = c > 0 ? w / c : 0;
      modStatus[m] = modules[m].subjects.every(s => subjStatus[s] === 'C') && modAvg[m] >= 10 ? 'V' : 'NV';
      modCredits[m] = earned;
    }
    
    let totalW = 0, totalC = 0;
    for (let s of required) { const cr = SUBJECT_CREDITS[dept][semester][s] || 3; totalW += (subjAvg[s] || 0) * cr; totalC += cr; }
    const genMoy = totalC > 0 ? totalW / totalC : 0;
    const hasNV = Object.values(modStatus).some(s => s === 'NV');
    const semStatus = hasNV ? 'Non Valide' : (genMoy >= 10 ? 'Valide' : 'Non Valide');
    const hasSR = Object.values(subjSR).some(v => v);
    
    return { genMoy, semStatus, modStatus, modCredits, modAvg, subjAvg, subjStatus, hasSR, modules };
  }

  async function loadAndDisplay() {
    const urlParams = new URLSearchParams(window.location.search);
    const dept = urlParams.get('dept'), sem = urlParams.get('sem'), id = urlParams.get('id'), name = urlParams.get('name');
    
    if (!dept || !sem || !id) {
      document.getElementById('studentResults').innerHTML = '<div class="empty-state"><h3>Lien invalide</h3></div>';
      return;
    }
    
    currentDept = dept; currentSemester = sem; currentStudentId = id; currentStudentName = name ? decodeURIComponent(name) : '';
    
    try {
      const snapshot = await get(child(ref(db), `results/${dept}/${sem}/${id}`));
      if (!snapshot.exists()) {
        document.getElementById('studentResults').innerHTML = '<div class="empty-state"><h3>Aucun resultat trouve</h3></div>';
        return;
      }
      
      const studentData = snapshot.val();
      if (!currentStudentName) for (let key in studentData) if (studentData[key].name) { currentStudentName = studentData[key].name; break; }
      
      const notesBySubject = {};
      for (let key in studentData) { const data = studentData[key]; if (!notesBySubject[data.subject]) notesBySubject[data.subject] = {}; notesBySubject[data.subject][data.type] = data.grade; }
      
      const modulesStructure = MODULES_STRUCTURE[dept]?.[sem];
      let allSubjectsPresent = modulesStructure && Object.keys(modulesStructure).length > 0;
      
      if (modulesStructure) {
        for (let moduleCode in modulesStructure) {
          for (let subject of modulesStructure[moduleCode].subjects) {
            const hasTPforSubject = hasTP(subject);
            const examExists = notesBySubject[subject] && notesBySubject[subject]['Examen'] !== undefined;
            const ccExists = notesBySubject[subject] && (notesBySubject[subject]['Controle continu'] !== undefined || notesBySubject[subject]['Contrôle continu'] !== undefined);
            const tpExists = !hasTPforSubject || (notesBySubject[subject] && notesBySubject[subject]['TP'] !== undefined);
            if (!examExists || !ccExists || !tpExists) { allSubjectsPresent = false; break; }
          }
        }
      }
      
      currentData = { name: currentStudentName, grades: notesBySubject };
      
      if (allSubjectsPresent && modulesStructure) {
        const results = calculateResultsFromNotes(notesBySubject, dept, sem);
        currentData.results = results;
        const showSRColumn = results.hasSR;
        
        let html = `<div class="student-header"><h3>${escapeHtml(currentStudentName)}</h3><p>N° ${escapeHtml(id)} | PPV | ${escapeHtml(sem)}</p></div><div style="overflow-x:auto;"><table class="releve-table"><thead><tr><th>Numero</th><th>Nom et Prenom</th><th>TP</th><th>CC</th><th>Examen</th>${showSRColumn ? '<th>SR</th>' : ''}<th>NFe</th><th>Credit</th><th>Obs</th></tr></thead><tbody>`;
        html += `<tr class="student-info-row"><td>${escapeHtml(id)}</td><td style="text-align:left;">${escapeHtml(currentStudentName)}</td><td></td><td></td><td></td>${showSRColumn ? '<td></td>' : ''}<td></td><td></td><td></td></tr>`;
        
        for (let moduleCode in results.modules) {
          const module = results.modules[moduleCode];
          html += `<tr class="module-row"><td>${moduleCode}</td><td style="text-align:left;">${module.name}</td><td></td><td></td><td></td>${showSRColumn ? '<td></td>' : ''}<td style="font-weight:bold;">${results.modAvg[moduleCode].toFixed(2)}</td><td>${module.credit}</td><td class="${results.modStatus[moduleCode] === 'V' ? 'status-V' : 'status-NV'}">${results.modStatus[moduleCode]}</td></tr>`;
          
          for (let subject of module.subjects) {
            const grades = notesBySubject[subject] || {};
            const tpDisplay = hasTP(subject) ? (grades['TP']?.toFixed(2) || '') : '';
            const ccDisplay = grades['Controle continu']?.toFixed(2) || grades['Contrôle continu']?.toFixed(2) || '';
            const examDisplay = grades['Examen']?.toFixed(2) || '';
            const ratt = grades['Rattrapage'];
            const srDisplay = (ratt !== undefined && ratt > (grades['Examen'] || 0)) ? ratt.toFixed(2) : '';
            const credit = SUBJECT_CREDITS.PPV[sem][subject] || 3;
            
            html += `<tr><td></td><td style="text-align:left; padding-left:20px;">${displaySubjectName(subject)}</td><td>${tpDisplay}</td><td>${ccDisplay}</td><td>${examDisplay}</td>${showSRColumn ? `<td>${srDisplay}</td>` : ''}<td style="font-weight:bold;">${results.subjAvg[subject].toFixed(2)}</td><td>${credit.toFixed(1)}</td><td class="${results.subjStatus[subject] === 'C' ? 'status-C' : 'status-NC'}">${results.subjStatus[subject]}</td></tr>`;
          }
        }
        
        const colspanValue = showSRColumn ? 6 : 5;
        html += `<tr class="moyenne-row"><td colspan="${colspanValue}" style="text-align:right; font-weight:bold;">Moyenne Semestre :</td><td style="font-weight:bold;">${results.genMoy.toFixed(2)}</td><td></td><td class="${results.semStatus === 'Valide' ? 'status-V' : 'status-NV'}" style="font-weight:bold;">${results.semStatus}</td></tr></tbody></table></div>`;
        
        document.getElementById('studentResults').innerHTML = html;
        document.getElementById('pdfButtonContainer').innerHTML = `<button class="admin-btn" onclick="window.generatePDF()">Telecharger mon releve PDF</button>`;
      } else {
        let html = `<div class="student-header"><h3>${escapeHtml(currentStudentName)}</h3><p>N° ${escapeHtml(id)} | PPV | ${escapeHtml(sem)}</p></div><div class="neutral-message">Les resultats ne sont pas encore finalises.</div>`;
        if (modulesStructure) {
          let hasTP = false, tpHtml = '<h4 class="section-subtitle">Resultats TP</h4><table class="simple-table"><thead><tr><th>Matiere</th><th>Note TP</th></tr></thead><tbody>';
          for (let m in modulesStructure) for (let s of modulesStructure[m].subjects) if (hasTP(s)) { const g = notesBySubject[s]?.['TP']; if (g !== undefined) hasTP = true; tpHtml += `<tr><td>${displaySubjectName(s)}</td><td>${g !== undefined ? g.toFixed(2) : ''}</td></tr>`; }
          tpHtml += '</tbody></table>'; if (hasTP) html += tpHtml;
          
          let ccHtml = '<h4 class="section-subtitle">Resultats Controle continu</h4><table class="simple-table"><thead><tr><th>Matiere</th><th>Note CC</th></tr></thead><tbody>';
          for (let m in modulesStructure) for (let s of modulesStructure[m].subjects) { const g = notesBySubject[s]?.['Controle continu'] || notesBySubject[s]?.['Contrôle continu']; ccHtml += `<tr><td>${displaySubjectName(s)}</td><td>${g !== undefined ? g.toFixed(2) : ''}</td></tr>`; }
          ccHtml += '</tbody></table>'; html += ccHtml;
          
          let examHtml = '<h4 class="section-subtitle">Resultats Examen</h4><table class="simple-table"><thead><tr><th>Matiere</th><th>Note Examen</th></tr></thead><tbody>';
          for (let m in modulesStructure) for (let s of modulesStructure[m].subjects) { const g = notesBySubject[s]?.['Examen']; examHtml += `<tr><td>${displaySubjectName(s)}</td><td>${g !== undefined ? g.toFixed(2) : ''}</td></tr>`; }
          examHtml += '</tbody></table>'; html += examHtml;
        }
        document.getElementById('studentResults').innerHTML = html;
        document.getElementById('pdfButtonContainer').innerHTML = '';
      }
    } catch (e) { document.getElementById('studentResults').innerHTML = '<div class="empty-state"><h3>Erreur de chargement</h3></div>'; }
  }
  
  window.generatePDF = function() {
    if (!currentData || !currentData.results) { alert("Resultats incomplets"); return; }
    
    const results = currentData.results;
    const studentName = currentData.name;
    const showSRColumn = results.hasSR;
    const colspanValue = showSRColumn ? 6 : 5;
    
    let content = `
      <div style="padding:8mm 5mm; font-family:'Times New Roman',serif; font-size:10pt;">
        <div style="font-weight:bold; font-size:11pt;">Institut Superieur d'Enseignement Technologique de Rosso</div>
        <div style="display:flex; justify-content:space-between; margin-top:3px;"><span style="font-weight:bold;">Resultats du ${currentSemester}</span><span>Annee Universitaire : 2025-2026</span></div>
        <div style="margin-top:2px;"><span style="font-weight:bold;">Filiere :</span> L2PPV-L2 Licence Production et Protection Vegetales</div>
        <table style="width:100%; border-collapse:collapse; border:1px solid #000; margin-top:8px;">
          <thead><tr><th style="border:1px solid #000; padding:3px;">Numero</th><th style="border:1px solid #000; padding:3px;">Nom et Prenom</th><th style="border:1px solid #000; padding:3px;">TP</th><th style="border:1px solid #000; padding:3px;">CC</th><th style="border:1px solid #000; padding:3px;">Examen</th>${showSRColumn ? '<th style="border:1px solid #000; padding:3px;">SR</th>' : ''}<th style="border:1px solid #000; padding:3px;">NFe</th><th style="border:1px solid #000; padding:3px;">Credit</th><th style="border:1px solid #000; padding:3px;">Obs</th></tr></thead>
        <tbody>
          <tr><td style="border:1px solid #000; padding:2px;">${escapeHtml(currentStudentId)}</td><td style="border:1px solid #000; padding:2px;">${escapeHtml(studentName)}</td><td style="border:1px solid #000; padding:2px;"></td><td style="border:1px solid #000; padding:2px;"></td><td style="border:1px solid #000; padding:2px;"></td>${showSRColumn ? '<td style="border:1px solid #000; padding:2px;"></td>' : ''}<td style="border:1px solid #000; padding:2px; font-weight:bold;">Moyenne Semestre : ${results.genMoy.toFixed(2)}</td><td style="border:1px solid #000; padding:2px;"></td><td style="border:1px solid #000; padding:2px;">${results.semStatus}</td></tr>
    `;
    
    for (let m in results.modules) {
      const mod = results.modules[m];
      content += `<tr><td style="border:1px solid #000; padding:2px;">${m}</td><td style="border:1px solid #000; padding:2px;">${mod.name}</td><td style="border:1px solid #000; padding:2px;"></td><td style="border:1px solid #000; padding:2px;"></td><td style="border:1px solid #000; padding:2px;"></td>${showSRColumn ? '<td style="border:1px solid #000; padding:2px;"></td>' : ''}<td style="border:1px solid #000; padding:2px; font-weight:bold;">${results.modAvg[m].toFixed(2)}</td><td style="border:1px solid #000; padding:2px;">${mod.credit}</td><td style="border:1px solid #000; padding:2px;">${results.modStatus[m]}</td></tr>`;
      
      for (let s of mod.subjects) {
        const grades = currentData.grades[s] || {};
        const tpDisplay = hasTP(s) ? (grades['TP']?.toFixed(2) || '') : '';
        const ccDisplay = grades['Controle continu']?.toFixed(2) || grades['Contrôle continu']?.toFixed(2) || '';
        const examDisplay = grades['Examen']?.toFixed(2) || '';
        const ratt = grades['Rattrapage'];
        const srDisplay = (ratt !== undefined && ratt > (grades['Examen'] || 0)) ? ratt.toFixed(2) : '';
        const credit = SUBJECT_CREDITS.PPV[currentSemester][s] || 3;
        
        content += `<tr><td style="border:1px solid #000; padding:1px;"></td><td style="border:1px solid #000; padding:1px; padding-left:15px;">${displaySubjectName(s)}</td><td style="border:1px solid #000; padding:1px;">${tpDisplay}</td><td style="border:1px solid #000; padding:1px;">${ccDisplay}</td><td style="border:1px solid #000; padding:1px;">${examDisplay}</td>${showSRColumn ? `<td style="border:1px solid #000; padding:1px;">${srDisplay}</td>` : ''}<td style="border:1px solid #000; padding:1px; font-weight:bold;">${results.subjAvg[s].toFixed(2)}</td><td style="border:1px solid #000; padding:1px;">${credit.toFixed(1)}</td><td style="border:1px solid #000; padding:1px;">${results.subjStatus[s]}</td></tr>`;
      }
    }
    
    content += `</tbody></table><p style="margin-top:10px; font-size:9pt;">V=Valide / NV=Non Valide / C=Capitalise / NC=Non Capitalise</p></div>`;
    
    const el = document.createElement('div'); el.innerHTML = content; document.body.appendChild(el);
    html2pdf().set({ margin:[5,3,5,3], filename:`Releve_${currentStudentId}_${currentSemester}.pdf` }).from(el).save().then(() => document.body.removeChild(el));
  };
  
  loadAndDisplay();
</script>
</body>
</html>
