<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résultats PPV - Consultation des notes</title>
<style>
  :root {
    --primary: #2c5f2d;
    --primary-dark: #1e4420;
    --primary-light: #e8f5e9;
    --light: #f5f7fa;
    --white: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --shadow: 0 4px 12px rgba(0,0,0,0.1);
    --radius: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height: 100%; }
  body { 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background:var(--light); 
    color:var(--text); 
    line-height:1.2;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  
  header { 
    background:linear-gradient(135deg,var(--primary),var(--primary-dark)); 
    color:var(--white); 
    padding:1.5rem 1rem; 
    text-align:center; 
  }
  header h1 { font-size:2rem; margin-bottom:0.3rem; font-weight:500; }
  header p { font-size:1rem; opacity:0.9; }
  
  .main-content { flex: 1 0 auto; }
  .container { max-width:1000px; margin:0 auto; padding:0 1rem; }
  
  .annonce-container { margin-bottom: 0.8rem; }
  .annonce-bloc {
    background: #fff3cd; border-left: 4px solid #d4a017;
    padding: 0.8rem 1rem; border-radius: var(--radius);
  }
  .annonce-texte { color: #856404; }
  
  .section-title { padding:1rem 0 0.8rem; font-size:1.3rem; color:var(--primary); text-align:center; font-weight:500; }
  
  .search-box { display:flex; max-width:500px; margin:0 auto; }
  .search-box input { 
    flex:1; padding:0.8rem 1rem; border:1px solid #ddd; 
    border-radius:var(--radius) 0 0 var(--radius); font-size:0.9rem; outline:none; 
  }
  .search-box input:focus { border-color:var(--primary); }
  .search-box button { 
    background:var(--primary); color:var(--white); border:none; padding:0 1.2rem;
    border-radius:0 var(--radius) var(--radius) 0; cursor:pointer; font-size:1rem;
  }
  .search-box button:hover { background:var(--primary-dark); }
  
  .result-card {
    background:var(--white); border-radius:var(--radius); padding:1.2rem;
    margin:1.5rem 0; box-shadow:var(--shadow);
  }
  
  .student-header {
    text-align:center; margin-bottom:1rem; padding-bottom:0.8rem;
    border-bottom:1px solid #ddd;
  }
  .student-header h3 { font-size:1.2rem; font-weight:500; }
  .student-header p { color:var(--text-light); font-size:0.85rem; }
  
  .empty-state { text-align:center; padding:2rem 1rem; color:var(--text-light); }
  .loading { text-align:center; padding:2rem; color:var(--text-light); }
  
  .pdf-link {
    display: inline-block; padding: 0.6rem 1.2rem; background: var(--primary); color: white;
    text-decoration: none; border-radius: var(--radius); font-weight:500; margin-top: 0.8rem;
  }
  .pdf-link:hover { background: var(--primary-dark); }
  
  .neutral-message {
    text-align: center; margin-top: 0.8rem; padding: 0.6rem; background: #e9ecef;
    color: #6c757d; border-radius: var(--radius);
  }
  
  .simple-table { width: 100%; border-collapse: collapse; margin: 0.8rem 0; font-size: 13px; }
  .simple-table th, .simple-table td { border: 1px solid #ddd; padding: 5px; text-align: center; }
  .simple-table th { background: var(--primary-light); font-weight:500; }
  
  .releve-table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 12px; }
  .releve-table th {
    border: 1px solid #aaa; padding: 2px 3px; text-align: center;
    background: var(--primary-light); font-weight:500;
  }
  .releve-table td { padding: 1px 3px; text-align: center; }
  .releve-table tbody tr:not(.module-row):not(.student-info-row):not(.moyenne-row) td { border: 1px solid #aaa; }
  
  .releve-table .student-info-row { background: #f0f8ff; font-weight:500; }
  .releve-table .student-info-row td {
    border-top: 1px solid #aaa; border-bottom: 1px solid #aaa;
    border-left: none; border-right: none; padding: 2px 3px;
  }
  .releve-table .student-info-row td:first-child { border-left: 1px solid #aaa; }
  .releve-table .student-info-row td:last-child { border-right: 1px solid #aaa; }
  
  .releve-table .module-row { background: #d4edda; font-weight:500; }
  .releve-table .module-row td {
    border-top: 1px solid #aaa; border-bottom: 1px solid #aaa;
    border-left: none; border-right: none; padding: 2px 3px;
  }
  .releve-table .module-row td:first-child { border-left: 1px solid #aaa; }
  .releve-table .module-row td:last-child { border-right: 1px solid #aaa; }
  
  .releve-table .subject-row td:first-child { text-align: left; padding-left: 15px; }
  .releve-table .subject-row td { padding: 1px 3px; }
  
  .status-C, .status-V { color: #27ae60; font-weight:500; }
  .status-NC, .status-NV { color: #e74c3c; font-weight:500; }
  
  .moyenne-row td { border: none !important; padding: 4px 3px 2px; background: transparent; }
  
  .section-subtitle {
    font-size: 1rem; color: var(--primary); margin: 0.8rem 0 0.3rem 0;
    padding-bottom: 0.2rem; border-bottom: 1px solid #ddd; font-weight:500;
  }
  
  .footer {
    flex-shrink: 0; text-align:center; padding:1.5rem; color:var(--text-light);
    font-size:0.85rem; border-top:1px solid #ddd; margin-top:2rem;
  }
  .footer a { color: var(--primary); text-decoration: none; }
  
  @media (max-width:600px) {
    header h1 { font-size:1.6rem; }
    .releve-table { font-size: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>Resultats PPV</h1>
    <p>Departement de Production et Protection Vegetales</p>
  </div>
</header>

<div class="main-content">
  <div class="container">
    <div id="annonceContainer" class="annonce-container"></div>
    
    <div class="result-card">
      <h2 class="section-title">Consulter votre resultat</h2>
      
      <div class="search-box">
        <input type="text" id="studentIdInput" placeholder="Entrez votre numero d'etudiant...">
        <button onclick="searchStudentResult()">Rechercher</button>
      </div>
      
      <div id="studentResultContainer" style="display:none;"></div>
      <div id="noResultMessage" style="display:none;" class="empty-state">
        <h3>Aucun resultat trouve</h3>
        <p>Verifiez votre numero d'etudiant</p>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>© 2026 Departement de Production et Protection Vegetales</p>
  <p style="margin-top:0.3rem; font-size:0.75rem;">
    <a href="Reco.html">Acces Coordinateur</a>
  </p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDnrW6WnmbEFpbWzlW9IGglxAafajt2Kyo",
    authDomain: "iset-b9974.firebaseapp.com",
    projectId: "iset-b9974",
    storageBucket: "iset-b9974.firebasestorage.app",
    messagingSenderId: "1054170284751",
    appId: "1:1054170284751:web:8f02232478430d5ae2adba",
    databaseURL: "https://iset-b9974-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const SUBJECTS_BY_DEPT = {
    PPV: {
      S3: ["Francais_s3", "Economie", "I_Agronomie", "I_Horticulture", "Pesticides_agricoles", "Entomologie_et_Nemato", "Science_des_sols", "Science_des_plantes"],
      S4: ["Vulgarisation", "Technique_de_propagation", "Technique_d_irrigation_et_BEC", "Ecophysiologie_et_Biochimie", "Fertilite_du_sol", "Methodes_de_diagnostic", "Malherbologie"],
      S5: [], S6: []
    }
  };

  const SUBJECTS_WITHOUT_TP = ["Anglais", "Anglais_2", "Francais", "Francais_2", "Francais_s3", "Math_et_Statistique", "Economie", "Vulgarisation"];
  const MODULES_STRUCTURE = {
    PPV: {
      S3: { M31: { name: "Langue et economie", credit: 6.0, subjects: ["Francais_s3", "Economie"] }, M32: { name: "Principes d'agronomie", credit: 8.0, subjects: ["I_Agronomie", "I_Horticulture"] }, M33: { name: "Phytoprotection 1", credit: 8.0, subjects: ["Pesticides_agricoles", "Entomologie_et_Nemato"] }, M34: { name: "Sciences du sol et des plantes", credit: 8.0, subjects: ["Science_des_sols", "Science_des_plantes"] } },
      S4: { M41: { name: "Vulgarisation", credit: 3.0, subjects: ["Vulgarisation"] }, M42: { name: "Techniques culturales", credit: 7.0, subjects: ["Technique_de_propagation", "Technique_d_irrigation_et_BEC"] }, M43: { name: "Physiologie et fertilite", credit: 7.0, subjects: ["Ecophysiologie_et_Biochimie", "Fertilite_du_sol"] }, M44: { name: "Protection des vegetaux", credit: 6.0, subjects: ["Methodes_de_diagnostic", "Malherbologie"] } }
    }
  };
  const SUBJECT_CREDITS = {
    PPV: { S3: {"Francais_s3":3,"Economie":3,"I_Agronomie":4,"I_Horticulture":4,"Pesticides_agricoles":4,"Entomologie_et_Nemato":4,"Science_des_sols":4,"Science_des_plantes":4}, S4: {"Vulgarisation":3,"Technique_de_propagation":4,"Technique_d_irrigation_et_BEC":3,"Ecophysiologie_et_Biochimie":4,"Fertilite_du_sol":3,"Methodes_de_diagnostic":3,"Malherbologie":3} }
  };

  function hasTP(s) { return !SUBJECTS_WITHOUT_TP.includes(s); }
  function displaySubjectName(s) { return s.replace(/_/g, ' ').replace(/I_/g, 'I.').replace(/et_/g, 'et '); }

  async function loadAnnonce() {
    try { const snap = await get(child(ref(db), 'annonces/active')); if (snap.exists()) { const a = snap.val(); if (a.expiration && Date.now() < a.expiration) return a; } return null; } catch (e) { return null; }
  }
  async function afficherAnnonce() {
    const a = await loadAnnonce(); const c = document.getElementById('annonceContainer');
    if (!a || !a.texte) { c.innerHTML = ''; return; }
    const d = new Date(a.expiration).toLocaleString('fr-FR');
    c.innerHTML = `<div class="annonce-bloc"><strong>Annonce :</strong> ${a.texte.replace(/</g,'&lt;')}<br><small>Visible jusqu'au ${d}</small></div>`;
  }

  function calculateResults(notes, dept, sem) {
    const mods = MODULES_STRUCTURE[dept]?.[sem]; if (!mods) return null;
    const req = []; for (let m in mods) for (let s of mods[m].subjects) if (!req.includes(s)) req.push(s);
    
    const subjAvg = {}, subjStatus = {}, subjSR = {};
    for (let s of req) {
      const n = notes[s] || {}; const exam = n['Examen']||0, cc = n['Controle continu']||n['Contrôle continu']||0, tp = n['TP']||0, ratt = n['Rattrapage'];
      const useSR = ratt !== undefined && ratt > exam; subjSR[s] = useSR;
      const final = useSR ? ratt : exam;
      subjAvg[s] = hasTP(s) ? (tp + cc*2 + final*3)/6 : (cc*2 + final*3)/5;
      subjStatus[s] = subjAvg[s] >= 10 ? 'C' : 'NC';
    }
    
    const modAvg = {}, modStatus = {}, modCredits = {};
    for (let m in mods) {
      let w = 0, c = 0, earned = 0;
      for (let s of mods[m].subjects) { const cr = SUBJECT_CREDITS[dept][sem][s]||3; w += (subjAvg[s]||0)*cr; c += cr; if (subjStatus[s]==='C') earned += cr; }
      modAvg[m] = c>0 ? w/c : 0;
      modStatus[m] = mods[m].subjects.every(s=>subjStatus[s]==='C') && modAvg[m]>=10 ? 'V' : 'NV';
      modCredits[m] = earned;
    }
    
    let tw = 0, tc = 0; for (let s of req) { const cr = SUBJECT_CREDITS[dept][sem][s]||3; tw += (subjAvg[s]||0)*cr; tc += cr; }
    const genMoy = tc>0 ? tw/tc : 0;
    const hasNV = Object.values(modStatus).some(s=>s==='NV');
    const semStatus = hasNV ? 'Non Valide' : (genMoy>=10 ? 'Valide' : 'Non Valide');
    const hasSR = Object.values(subjSR).some(v=>v);
    return { genMoy, semStatus, modStatus, modCredits, modAvg, subjAvg, subjStatus, hasSR, modules: mods };
  }

  window.searchStudentResult = async () => {
    const id = document.getElementById('studentIdInput').value.trim();
    const cont = document.getElementById('studentResultContainer'), noRes = document.getElementById('noResultMessage');
    if (!id) { alert('Veuillez entrer votre numero d\'etudiant'); return; }
    cont.innerHTML = '<div class="loading">Chargement...</div>'; cont.style.display = 'block'; noRes.style.display = 'none';
    
    const sems = ['S3','S4','S5','S6']; let data = null, sem = null;
    for (let s of sems) { const snap = await get(child(ref(db), `results/PPV/${s}/${id}`)); if (snap.exists()) { data = snap.val(); sem = s; break; } }
    if (!data) { cont.style.display = 'none'; noRes.style.display = 'block'; return; }
    
    let name = ''; const notes = {};
    for (let k in data) { if (data[k].name) name = data[k].name; if (!notes[data[k].subject]) notes[data[k].subject] = {}; notes[data[k].subject][data[k].type] = data[k].grade; }
    
    const req = SUBJECTS_BY_DEPT.PPV[sem] || []; let complete = req.length > 0;
    for (let s of req) { const htp = hasTP(s); if (!notes[s]?.['Examen'] || !notes[s]?.['Controle continu'] || (htp && !notes[s]?.['TP'])) { complete = false; break; } }
    
    let html = `<div class="student-header"><h3>${name || 'Etudiant'}</h3><p>N° ${id} | PPV | ${sem}</p></div>`;
    
    if (complete) {
      const res = calculateResults(notes, 'PPV', sem); const showSR = res.hasSR;
      html += '<div style="overflow-x:auto;"><table class="releve-table"><thead><tr><th>Numero</th><th>Nom et Prenom</th><th>TP</th><th>CC</th><th>Examen</th>'+(showSR?'<th>SR</th>':'')+'<th>NFe</th><th>Credit</th><th>Obs</th></tr></thead><tbody>';
      html += `<tr class="student-info-row"><td>${id}</td><td style="text-align:left; padding-left:10px;">${name}</td><td></td><td></td><td></td>${showSR?'<td></td>':''}<td></td><td></td><td></td></tr>`;
      
      for (let m in res.modules) {
        const mod = res.modules[m];
        html += `<tr class="module-row"><td>${m}</td><td style="text-align:left; padding-left:10px;">${mod.name}</td><td></td><td></td><td></td>${showSR?'<td></td>':''}<td style="font-weight:500;">${res.modAvg[m].toFixed(2)}</td><td>${res.modCredits[m].toFixed(1)}</td><td class="${res.modStatus[m]==='V'?'status-V':'status-NV'}">${res.modStatus[m]}</td></tr>`;
        for (let s of mod.subjects) {
          const n = notes[s] || {}; const tp = hasTP(s) ? (n['TP']?.toFixed(2)||'') : '';
          const cc = n['Controle continu']?.toFixed(2) || n['Contrôle continu']?.toFixed(2) || '';
          const exam = n['Examen']?.toFixed(2)||''; const ratt = n['Rattrapage'];
          const sr = (ratt !== undefined && ratt > (n['Examen']||0)) ? ratt.toFixed(2) : '';
          const cr = SUBJECT_CREDITS.PPV[sem][s]||3;
          html += `<tr class="subject-row"><td></td><td style="text-align:left; padding-left:20px;">${displaySubjectName(s)}</td><td>${tp}</td><td>${cc}</td><td>${exam}</td>${showSR?`<td>${sr}</td>`:''}<td style="font-weight:500;">${res.subjAvg[s].toFixed(2)}</td><td>${cr.toFixed(1)}</td><td class="${res.subjStatus[s]==='C'?'status-C':'status-NC'}">${res.subjStatus[s]}</td></tr>`;
        }
      }
      const colspan = showSR ? 6 : 5;
      html += `<tr class="moyenne-row"><td colspan="${colspan}" style="text-align:right; font-weight:500;">Moyenne Semestre :</td><td style="font-weight:500;">${res.genMoy.toFixed(2)}</td><td></td><td class="${res.semStatus==='Valide'?'status-V':'status-NV'}" style="font-weight:500;">${res.semStatus}</td></tr></tbody></table></div>`;
      html += `<div style="text-align:center;"><a href="result.html?dept=PPV&sem=${sem}&id=${id}&name=${encodeURIComponent(name)}" class="pdf-link" target="_blank">Telecharger mon releve PDF</a></div>`;
    } else {
      let hasTP=false, hasCC=false, hasExam=false;
      for (let s of req) { if (notes[s]?.['TP']!==undefined) hasTP=true; if (notes[s]?.['Controle continu']!==undefined) hasCC=true; if (notes[s]?.['Examen']!==undefined) hasExam=true; }
      if (hasTP) { html += `<h4 class="section-subtitle">Resultats TP</h4><table class="simple-table"><thead><tr><th>Matiere</th><th>Note TP</th></tr></thead><tbody>`; for (let s of req) if (hasTP(s)) { const n=notes[s]?.['TP']; html += `<tr><td>${displaySubjectName(s)}</td><td>${n!==undefined?n.toFixed(2):''}</td></tr>`; } html += `</tbody></table>`; }
      if (hasCC) { html += `<h4 class="section-subtitle">Resultats Controle continu</h4><table class="simple-table"><thead><tr><th>Matiere</th><th>Note CC</th></tr></thead><tbody>`; for (let s of req) { const n=notes[s]?.['Controle continu']; html += `<tr><td>${displaySubjectName(s)}</td><td>${n!==undefined?n.toFixed(2):''}</td></tr>`; } html += `</tbody></table>`; }
      if (hasExam) { html += `<h4 class="section-subtitle">Resultats Examen</h4><table class="simple-table"><thead><tr><th>Matiere</th><th>Note Examen</th></tr></thead><tbody>`; for (let s of req) { const n=notes[s]?.['Examen']; html += `<tr><td>${displaySubjectName(s)}</td><td>${n!==undefined?n.toFixed(2):''}</td></tr>`; } html += `</tbody></table>`; }
      html += `<div class="neutral-message">Les resultats ne sont pas encore finalises.</div>`;
    }
    cont.innerHTML = html;
  };

  document.getElementById('studentIdInput').addEventListener('keyup', e => { if (e.key === 'Enter') searchStudentResult(); });
  afficherAnnonce();
</script>
</body>
</html>
