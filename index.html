<style>
  :root {
    --primary: #0077b6;
    --primary-dark: #005f87;
    --primary-light: #caf0f8;
    --secondary: #0096c7;
    --light: #f5f7fa;
    --white: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --shadow: 0 4px 12px rgba(0,0,0,0.1);
    --radius: 10px;
    --transition: all 0.3s ease;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background:var(--light); 
    color:var(--text); 
    line-height:1.6;
  }
  
  header { 
    background:linear-gradient(135deg,var(--primary),var(--secondary)); 
    color:var(--white); 
    padding:2rem 1rem; 
    text-align:center; 
    box-shadow:var(--shadow); 
  }
  header h1 { 
    font-size:2.2rem; 
    margin-bottom:0.5rem; 
    display:flex; 
    align-items:center; 
    justify-content:center; 
    gap:0.5rem; 
    flex-wrap:wrap; 
  }
  header p { 
    font-size:1.1rem; 
    opacity:0.9; 
  }
  .container { 
    max-width:1200px; 
    margin:0 auto; 
    padding:0 1rem; 
  }
  
  .section-title { 
    padding:1.5rem 0 1rem; 
    font-size:1.4rem; 
    color:var(--primary); 
    display:flex; 
    align-items:center; 
    gap:0.5rem; 
  }
  
  .result-card {
    background:var(--white);
    border-radius:var(--radius);
    padding:1.5rem;
    margin:2rem 0;
    box-shadow:var(--shadow);
  }
  
  .student-header {
    text-align:center;
    margin-bottom:1.5rem;
    padding-bottom:1rem;
    border-bottom:2px solid var(--primary-light);
  }
  .student-header i {
    font-size:3rem;
    color:var(--primary);
    margin-bottom:0.5rem;
  }
  
  .results-table {
    width:100%;
    border-collapse:collapse;
  }
  .results-table th {
    background:var(--primary-light);
    padding:0.8rem;
    text-align:left;
    color:var(--primary-dark);
    font-weight:600;
  }
  .results-table td {
    padding:0.8rem;
    border-bottom:1px solid #eee;
  }
  
  .grade-badge {
    font-weight:bold;
    padding:0.2rem 0.8rem;
    border-radius:20px;
    display:inline-block;
  }
  .grade-success { color:#2d6a4f; background:#d4edda; }
  .grade-fail { color:#e63946; background:#f8d7da; }
  .grade-warning { color:#856404; background:#fff3cd; }
  
  .empty-state { text-align:center; padding:3rem 1rem; color:var(--text-light); }
  .empty-state i { font-size:4rem; margin-bottom:1rem; color:var(--primary-light); }
  
  .loading { text-align:center; padding:3rem; color:var(--text-light); }
  .loading i { font-size:2.5rem; animation:spin 1s linear infinite; margin-bottom:1rem; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  
  .admin-section { margin-top:3rem; padding-top:2rem; border-top:2px dashed var(--primary-light); }
  
  .admin-btn {
    padding:0.8rem 1.5rem;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:var(--radius);
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:var(--transition);
    margin:0.3rem;
  }
  .admin-btn:hover { background:var(--primary-dark); }
  .admin-btn.secondary { background:#6c757d; }
  .admin-btn.danger { background:#dc3545; }
  .admin-btn.success { background:#28a745; }
  .admin-btn.warning { background:#ffc107; color:#333; }
  
  .admin-panel {
    background:var(--white);
    border-radius:var(--radius);
    padding:2rem;
    margin:1.5rem 0;
    box-shadow:var(--shadow);
    display:none;
  }
  .admin-panel.active { display:block; }
  
  .form-group { margin-bottom:1.2rem; }
  .form-group label { display:block; font-weight:600; margin-bottom:0.3rem; }
  .form-group select, .form-group input {
    width:100%;
    padding:0.8rem 1rem;
    border:2px solid var(--primary-light);
    border-radius:var(--radius);
    font-size:1rem;
    outline:none;
  }
  .form-group select:focus, .form-group input:focus { border-color:var(--primary); }
  
  .message {
    padding:0.8rem 1rem;
    border-radius:var(--radius);
    margin-bottom:1rem;
    display:none;
  }
  .message.success { background:#d4edda; color:#155724; }
  .message.error { background:#f8d7da; color:#721c24; }
  .message.info { background:#cce5ff; color:#004085; }
  
  .footer { text-align:center; padding:2rem; color:var(--text-light); font-size:0.9rem; }
  
  .action-buttons { display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }
  .average-display { text-align: center; padding: 1rem; background: var(--primary-light); border-radius: var(--radius); margin-top: 1.5rem; }
  .average-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
  
  /* Style pour le tableau de saisie coordinateur */
  .notes-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
  }
  .notes-table th, .notes-table td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
  }

    border-radius: 4px;

    background-color: #e8f4fc !important;

  }

  .status-NC { color: #e74c3c; font-weight: bold; }
  .status-V { color: #27ae60; font-weight: bold; }
  .status-NV { color: #e74c3c; font-weight: bold; }
  
  @media (max-width:768px) {
    .notes-table { font-size: 12px; }
    .notes-table input { width: 60px; }
  }

  // ==================== STOCKAGE LOCAL ====================
  let allStudents = JSON.parse(localStorage.getItem('iset_students')) || {};
  let currentAdmin = null;
  let currentStudentDataForCoord = null;

  function saveToLocalStorage() {
    localStorage.setItem('iset_students', JSON.stringify(allStudents));

  // ==================== CALCUL DES MOYENNES ====================
  function calculateSubjectGrade(subject, grades) {
    const hasTP = subject.hasTP;
    const exam = grades.examen || 0;
    const rattrapage = grades.rattrapage;
    const finalExam = (rattrapage !== undefined && rattrapage > exam) ? rattrapage : exam;
    
    if (hasTP) {
      const tp = grades.tp || 0;
      const cc = grades.cc || 0;
      return (tp * 1 + cc * 2 + finalExam * 3) / 6;
    } else {
      const cc = grades.cc || 0;
      return (cc * 2 + finalExam * 3) / 5;
    }
  }

  function calculateAllResults(student, semesterConfig) {
    const modules = semesterConfig.modules;
    const subjectGrades = {};
    
    // Calcul des notes de chaque matière
    for (let moduleCode in modules) {
      const module = modules[moduleCode];
      for (let subject of module.subjects) {
        const grades = student.grades?.[subject.code] || {};
        const moyenne = calculateSubjectGrade(subject, grades);
        subjectGrades[subject.code] = { moyenne, status: null };
      }
    }
    
    // Détermination du statut de chaque matière
    for (let moduleCode in modules) {
      const module = modules[moduleCode];
      const subjectsInModule = module.subjects;
      
      if (subjectsInModule.length === 1) {
        const subject = subjectsInModule[0];
        const moyenne = subjectGrades[subject.code].moyenne;
        subjectGrades[subject.code].status = moyenne >= 10 ? 'C' : 'NC';
      } else {
        const subj1 = subjectsInModule[0];
        const subj2 = subjectsInModule[1];
        const m1 = subjectGrades[subj1.code].moyenne;
        const m2 = subjectGrades[subj2.code].moyenne;
        
        // Règle: si une matière < 7 → NC direct
        if (m1 < 7 || m2 < 7) {
          subjectGrades[subj1.code].status = m1 < 7 ? 'NC' : (m1 >= 10 ? 'C' : 'NC');
          subjectGrades[subj2.code].status = m2 < 7 ? 'NC' : (m2 >= 10 ? 'C' : 'NC');
        } else {
          const credit1 = subj1.credit;
          const credit2 = subj2.credit;
          const moduleMoyenne = (m1 * credit1 + m2 * credit2) / (credit1 + credit2);
          
          if (m1 >= 10 && m2 >= 10) {
            subjectGrades[subj1.code].status = 'C';
            subjectGrades[subj2.code].status = 'C';
          } else if (m1 >= 10 && m2 < 10) {
            if (m2 >= 7 && moduleMoyenne >= 10) {
              subjectGrades[subj1.code].status = 'C';
              subjectGrades[subj2.code].status = 'C';
            } else {
              subjectGrades[subj1.code].status = 'C';
              subjectGrades[subj2.code].status = 'NC';
            }
          } else if (m1 < 10 && m2 >= 10) {
            if (m1 >= 7 && moduleMoyenne >= 10) {
              subjectGrades[subj1.code].status = 'C';
              subjectGrades[subj2.code].status = 'C';
            } else {
              subjectGrades[subj1.code].status = 'NC';
              subjectGrades[subj2.code].status = 'C';
            }
          } else {
            if (moduleMoyenne >= 10) {
              subjectGrades[subj1.code].status = 'C';
              subjectGrades[subj2.code].status = 'C';
            } else {
              subjectGrades[subj1.code].status = 'NC';
              subjectGrades[subj2.code].status = 'NC';
            }
          }
        }
      }
    }
    
    // Calcul des moyennes et statuts des modules
    const moduleResults = {};
    let totalWeighted = 0;
    let totalCredits = 0;
    let modulesNV = [];
    
    for (let moduleCode in modules) {
      const module = modules[moduleCode];
      let moduleWeighted = 0;
      let moduleCredits = 0;
      
      for (let subject of module.subjects) {
        const moyenne = subjectGrades[subject.code].moyenne;
        moduleWeighted += moyenne * subject.credit;
        moduleCredits += subject.credit;
      }
      
      const moduleMoyenne = moduleWeighted / moduleCredits;
      let hasNC = false;
      for (let subject of module.subjects) {
        if (subjectGrades[subject.code].status === 'NC') {
          hasNC = true;
          break;
        }
      }
      
      let moduleStatus = hasNC ? 'NV' : (moduleMoyenne >= 10 ? 'V' : 'NV');
      
      moduleResults[moduleCode] = {
        name: module.name,
        moyenne: moduleMoyenne,
        status: moduleStatus,
        credit: module.credit,
        subjects: module.subjects.map(s => ({
          code: s.code,
          name: s.name,
          credit: s.credit,
          moyenne: subjectGrades[s.code].moyenne,
          status: subjectGrades[s.code].status
        }))
      };
      
      if (moduleStatus === 'NV') {
        modulesNV.push({ code: moduleCode, moyenne: moduleMoyenne });
      }
      
      totalWeighted += moduleMoyenne * module.credit;
      totalCredits += module.credit;
    }
    
    const generaleMoyenne = totalWeighted / totalCredits;
    
    // Règle de compensation par moyenne générale
    let allNVBetween9and10 = true;
    for (let nv of modulesNV) {
      if (nv.moyenne < 9) {
        allNVBetween9and10 = false;
        break;
      }
    }
    
    if (allNVBetween9and10 && modulesNV.length > 0 && generaleMoyenne >= 10) {
      for (let nv of modulesNV) {
        moduleResults[nv.code].status = 'V';
        for (let subject of moduleResults[nv.code].subjects) {
          subject.status = 'C';
        }
      }
    }
    
    // Re-vérifier: si un module a une matière NC → NV
    for (let moduleCode in moduleResults) {
      let hasNC = false;
      for (let subject of moduleResults[moduleCode].subjects) {
        if (subject.status === 'NC') {
          hasNC = true;
          break;
        }
      }
      if (hasNC) {
        moduleResults[moduleCode].status = 'NV';
      }
    }
    
    const semestreStatus = generaleMoyenne >= 10 ? 'Validé' : 'Non Validé';
    
    return {
      moyenneGenerale: generaleMoyenne,
      semestreStatus: semestreStatus,
      modules: moduleResults,
      calculated: true
    };
  }

  // ==================== FONCTIONS AFFICHAGE ====================
  function updateSemesterSelect(dept) {
    const select = document.getElementById('studentSemester');
    select.innerHTML = '<option value="">-- Choisir --</option>';
    const semesters = SEMESTERS_CONFIG[dept];
    if (semesters) {
      for (let key in semesters) {
        if (semesters[key].modules && Object.keys(semesters[key].modules).length > 0) {
          select.innerHTML += `<option value="${key}">${semesters[key].name}</option>`;
        }
      }
    }
  }

  async function searchStudentResults() {
    const dept = document.getElementById('studentDept').value;
    const semester = document.getElementById('studentSemester').value;
    const studentId = document.getElementById('studentId').value.trim();
    const container = document.getElementById('studentResults');
    
    if (!dept || !semester || !studentId) {
      alert('Veuillez remplir tous les champs');
      return;
    }
    
    const student = allStudents[`${dept}_${semester}_${studentId}`];
    if (!student || !student.calculated) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-user-graduate"></i><h3>Aucun résultat trouvé</h3><p>Les résultats n\'ont pas encore été calculés par le coordinateur.</p></div>';
      document.getElementById('studentPDFBtn').innerHTML = '';
      return;
    }
    
    displayStudentResults(student, dept, semester, studentId);
  }
  
  function displayStudentResults(student, dept, semester, studentId) {
    const container = document.getElementById('studentResults');
    const results = student.results;
    
    let html = `
      <div class="student-header">
        <i class="fas fa-user-graduate"></i>
        <h3>${student.name}</h3>
        <p>N° ${studentId} | ${dept} | ${SEMESTERS_CONFIG[dept][semester].name}</p>
      </div>
      <div class="average-display">
        <h3>Moyenne Générale</h3>
        <div class="average-value">${results.moyenneGenerale.toFixed(2)} / 20</div>
        <div class="${results.semestreStatus === 'Validé' ? 'grade-success' : 'grade-fail'}" style="display:inline-block; padding:0.5rem 1.5rem; margin-top:0.5rem; border-radius:25px;">
          <i class="fas ${results.semestreStatus === 'Validé' ? 'fa-check-circle' : 'fa-times-circle'}"></i>
          ${results.semestreStatus}
        </div>
      </div>
    `;
    
    for (let moduleCode in results.modules) {
      const module = results.modules[moduleCode];
      html += `
        <table class="results-table" style="margin-top:1.5rem;">
          <thead><tr><th colspan="5">${moduleCode} - ${module.name} (${module.credit} crédits)</th></tr></thead>
          <thead><tr><th>Matière</th><th>TP</th><th>CC</th><th>Examen</th><th>Note finale</th><th>Statut</th></tr></thead>
          <tbody>
      `;
      for (let subject of module.subjects) {
        const grades = student.grades?.[subject.code] || {};
        const rattrapage = grades.rattrapage;
        const examDisplay = rattrapage ? `${grades.examen || '-'} → ${rattrapage}` : (grades.examen || '-');
        html += `
          <tr>
            <td><strong>${subject.name}</strong>${subject.hasTP ? '' : ' (sans TP)'}</td>
            <td>${grades.tp || '-'}</td>
            <td>${grades.cc || '-'}</td>
            <td>${examDisplay}</td>
            <td><strong>${subject.moyenne.toFixed(2)}</strong></td>
            <td class="${subject.status === 'C' ? 'status-C' : 'status-NC'}">${subject.status}</td>
          </tr>
        `;
      }
      html += `<tr class="module-row"><td colspan="4"><strong>Moyenne du module</strong></td><td><strong>${module.moyenne.toFixed(2)}</strong></td><td class="${module.status === 'V' ? 'status-V' : 'status-NV'}">${module.status}</td></tr>`;
      html += `</tbody></table>`;
    }
    
    container.innerHTML = html;
    document.getElementById('studentPDFBtn').innerHTML = `<button class="admin-btn" onclick="generateStudentPDF('${dept}', '${semester}', '${studentId}')"><i class="fas fa-file-pdf"></i> Télécharger mon relevé PDF</button>`;
  }
  
  // ==================== FONCTIONS COORDINATEUR ====================
  const ADMIN_PASSWORDS = {
    TC: "tc2024",
    PPV: "ppv2024"
  };
  
  function showAdminLogin() {
    document.getElementById('adminPanel').classList.add('active');
    document.getElementById('adminLoginForm').style.display = 'block';
    document.getElementById('adminActions').style.display = 'none';
  }
  
  function hideAdminPanel() {
    document.getElementById('adminPanel').classList.remove('active');
    currentAdmin = null;
  }
  
  function adminLogin() {
    const dept = document.getElementById('adminDeptSelect').value;
    const password = document.getElementById('adminPassword').value;
    
    if (ADMIN_PASSWORDS[dept] === password) {
      currentAdmin = dept;
      document.getElementById('adminLoginForm').style.display = 'none';
      document.getElementById('adminActions').style.display = 'block';
      document.getElementById('adminDeptName').textContent = dept;
      document.getElementById('adminPassword').value = '';
      
      const semesterSelect = document.getElementById('coordSemester');
      semesterSelect.innerHTML = '<option value="">-- Choisir --</option>';
      const semesters = SEMESTERS_CONFIG[dept];
      for (let key in semesters) {
        if (semesters[key].modules && Object.keys(semesters[key].modules).length > 0) {
          semesterSelect.innerHTML += `<option value="${key}">${semesters[key].name}</option>`;
        }
      }
    } else {
      document.getElementById('loginMsg').textContent = 'Mot de passe incorrect';
      document.getElementById('loginMsg').style.display = 'block';
    }
  }
  
  function adminLogout() {
    currentAdmin = null;
    document.getElementById('adminLoginForm').style.display = 'block';
    document.getElementById('adminActions').style.display = 'none';
  }
  
  function loadStudentForCoord() {
    const semester = document.getElementById('coordSemester').value;
    if (!semester) return;
    
    const studentSelect = document.getElementById('coordStudent');
    const prefix = `${currentAdmin}_${semester}_`;
    const students = Object.keys(allStudents)
      .filter(key => key.startsWith(prefix))
      .map(key => ({ id: key.replace(prefix, ''), data: allStudents[key] }));
    
    studentSelect.innerHTML = '<option value="">-- Sélectionner un étudiant --</option>';
    students.forEach(s => {
      studentSelect.innerHTML += `<option value="${s.id}">${s.id} - ${s.data.name || 'Sans nom'}</option>`;
    });
  }
  
  function showAddStudentForm() {
    document.getElementById('addStudentForm').style.display = 'block';
  }
  
  function hideAddStudentForm() {
    document.getElementById('addStudentForm').style.display = 'none';
    document.getElementById('newStudentId').value = '';
    document.getElementById('newStudentName').value = '';
  }
  
  function addNewStudent() {
    const semester = document.getElementById('coordSemester').value;
    const studentId = document.getElementById('newStudentId').value.trim();
    const studentName = document.getElementById('newStudentName').value.trim();
    
    if (!semester || !studentId || !studentName) {
      alert('Veuillez remplir tous les champs');
      return;
    }
    
    const key = `${currentAdmin}_${semester}_${studentId}`;
    if (allStudents[key]) {
      alert('Cet étudiant existe déjà');
      return;
    }
    
    allStudents[key] = {
      name: studentName,
      grades: {},
      calculated: false
    };
    saveToLocalStorage();
    hideAddStudentForm();
    loadStudentForCoord();
    document.getElementById('coordStudent').value = studentId;
    loadStudentGrades();
  }
  
  function loadStudentGrades() {
    const semester = document.getElementById('coordSemester').value;
    const studentId = document.getElementById('coordStudent').value;
    if (!semester || !studentId) return;
    
    const key = `${currentAdmin}_${semester}_${studentId}`;
    const student = allStudents[key];
    if (!student) return;
    
    currentStudentDataForCoord = student;
    const semesterConfig = SEMESTERS_CONFIG[currentAdmin][semester];
    
    let html = '<h4 style="margin:1rem 0">Saisie des notes</h4>';
    html += '<table class="notes-table"><thead><tr><th>Module</th><th>Matière</th><th>TP</th><th>CC (Devoir)</th><th>Examen</th><th>Rattrapage</th></tr></thead><tbody>';
    
    for (let moduleCode in semesterConfig.modules) {
      const module = semesterConfig.modules[moduleCode];
      let firstRow = true;
      for (let subject of module.subjects) {
        const grades = student.grades?.[subject.code] || {};
        html += `<tr>
          <td>${firstRow ? moduleCode + '<br>' + module.name : ''}</td>
          <td>${subject.name}${!subject.hasTP ? '<br><small>(sans TP)</small>' : ''}</td>
          <td><input type="number" step="0.01" min="0" max="20" id="tp_${subject.code}" value="${grades.tp || ''}" ${!subject.hasTP ? 'disabled' : ''} style="width:70px"></td>
          <td><input type="number" step="0.01" min="0" max="20" id="cc_${subject.code}" value="${grades.cc || ''}" style="width:70px"></td>
          <td><input type="number" step="0.01" min="0" max="20" id="exam_${subject.code}" value="${grades.examen || ''}" style="width:70px"></td>
          <td><input type="number" step="0.01" min="0" max="20" id="ratt_${subject.code}" value="${grades.rattrapage || ''}" style="width:70px"></td>
        </tr>`;
        firstRow = false;
      }
    }
    
    html += '</tbody></table>';
    html += '<button class="admin-btn success" onclick="saveStudentGrades()" style="margin-top:1rem"><i class="fas fa-save"></i> Enregistrer les notes</button>';
    
    document.getElementById('gradesContainer').innerHTML = html;
  }
  
  function saveStudentGrades() {
    const semester = document.getElementById('coordSemester').value;
    const studentId = document.getElementById('coordStudent').value;
    const key = `${currentAdmin}_${semester}_${studentId}`;
    const student = allStudents[key];
    
    if (!student) return;
    
    const semesterConfig = SEMESTERS_CONFIG[currentAdmin][semester];
    const newGrades = {};
    
    for (let moduleCode in semesterConfig.modules) {
      for (let subject of semesterConfig.modules[moduleCode].subjects) {
        const tp = document.getElementById(`tp_${subject.code}`)?.value;
        const cc = document.getElementById(`cc_${subject.code}`)?.value;
        const examen = document.getElementById(`exam_${subject.code}`)?.value;
        const rattrapage = document.getElementById(`ratt_${subject.code}`)?.value;
        
        newGrades[subject.code] = {
          tp: tp ? parseFloat(tp) : undefined,
          cc: cc ? parseFloat(cc) : undefined,
          examen: examen ? parseFloat(examen) : undefined,
          rattrapage: rattrapage ? parseFloat(rattrapage) : undefined
        };
      }
    }
    
    student.grades = newGrades;
    student.calculated = false;
    saveToLocalStorage();
    
    document.getElementById('adminMsg').textContent = 'Notes enregistrées avec succès';
    document.getElementById('adminMsg').className = 'message success';
    document.getElementById('adminMsg').style.display = 'block';
    setTimeout(() => document.getElementById('adminMsg').style.display = 'none', 3000);
  }
  
  function calculateAndSaveAll() {
    const semester = document.getElementById('coordSemester').value;
    if (!semester) return;
    
    const prefix = `${currentAdmin}_${semester}_`;
    const students = Object.keys(allStudents).filter(key => key.startsWith(prefix));
    
    let count = 0;
    for (let key of students) {
      const student = allStudents[key];
      if (student.grades) {
        const semesterConfig = SEMESTERS_CONFIG[currentAdmin][semester];
        const results = calculateAllResults(student, semesterConfig);
        student.results = results;
        student.calculated = true;
        
        // Ajouter les moyennes individuelles des matières
        for (let moduleCode in results.modules) {
          for (let subject of results.modules[moduleCode].subjects) {
            if (student.grades[subject.code]) {
              student.grades[subject.code].moyenne = subject.moyenne;
              student.grades[subject.code].status = subject.status;
            }
          }
        }
        count++;
      }
    }
    
    saveToLocalStorage();
    loadStudentGrades();
    
    document.getElementById('adminMsg').textContent = `${count} étudiant(s) calculé(s) avec succès`;
    document.getElementById('adminMsg').className = 'message success';
    document.getElementById('adminMsg').style.display = 'block';
    setTimeout(() => document.getElementById('adminMsg').style.display = 'none', 3000);
  }
  
  function generateStudentPDF(dept, semester, studentId) {
    const key = `${dept}_${semester}_${studentId}`;
    const student = allStudents[key];
    if (!student || !student.results) return;
    
    const results = student.results;
    const semesterName = SEMESTERS_CONFIG[dept][semester].name;
    
    let content = `
      <div style="padding: 20mm; font-family: 'Times New Roman', Times, serif;">
        <div style="text-align:center; margin-bottom:30px;">
          <h2>République Islamique de Mauritanie</h2>
          <h3>Ministère de l'Enseignement Supérieur et de la Recherche Scientifique</h3>
          <h3>Institut Supérieur d'Enseignement Technologique de Rosso</h3>
          <hr style="margin:20px 0">
          <h1 style="color:#0077b6;">RELEVÉ DE NOTES</h1>
          <h3>${semesterName}</h3>
          <h3>Année académique 2024-2025</h3>
        </div>
        
        <div style="margin-bottom:20px;">
          <p><strong>Étudiant(e) :</strong> ${student.name}</p>
          <p><strong>N° d'étudiant :</strong> ${studentId}</p>
          <p><strong>Département :</strong> ${dept}</p>
        </div>
    `;
    
    for (let moduleCode in results.modules) {
      const module = results.modules[moduleCode];
      content += `
        <div style="margin:20px 0;">
          <h4 style="background:#caf0f8; padding:8px;">${moduleCode} - ${module.name} (${module.credit} crédits)</h4>
          <table style="width:100%; border-collapse:collapse;">
            <thead>
              <tr style="background:#f0f0f0;">
                <th style="border:1px solid #ddd; padding:8px; text-align:left;">Matière</th>
                <th style="border:1px solid #ddd; padding:8px; text-align:center;">Note</th>
                <th style="border:1px solid #ddd; padding:8px; text-align:center;">Statut</th>
              </tr>
            </thead>
            <tbody>
      `;
      for (let subject of module.subjects) {
        content += `
          <tr>
            <td style="border:1px solid #ddd; padding:8px;">${subject.name}</td>
            <td style="border:1px solid #ddd; padding:8px; text-align:center;">${subject.moyenne.toFixed(2)}/20</td>
            <td style="border:1px solid #ddd; padding:8px; text-align:center;">${subject.status}</td>
          </tr>
        `;
      }
      content += `
        <tr style="background:#e8f4fc; font-weight:bold;">
          <td style="border:1px solid #ddd; padding:8px;">Moyenne du module</td>
          <td style="border:1px solid #ddd; padding:8px; text-align:center;">${module.moyenne.toFixed(2)}/20</td>
          <td style="border:1px solid #ddd; padding:8px; text-align:center;">${module.status}</td>
        </tr>
      </tbody></table>
      </div>`;
    }
    
    content += `
      <div style="margin-top:30px; padding:15px; background:#caf0f8; text-align:center; border-radius:10px;">
        <h3>Moyenne Générale du Semestre</h3>
        <h1 style="font-size:2.5rem;">${results.moyenneGenerale.toFixed(2)} / 20</h1>
        <h3 style="color:${results.semestreStatus === 'Validé' ? '#2d6a4f' : '#e63946'}">${results.semestreStatus}</h3>
      </div>
      
      <div style="margin-top:50px;">
        <p style="text-align:right;">Fait à Rosso, le ${new Date().toLocaleDateString('fr-FR')}</p>
        <div style="text-align:right; margin-top:30px;">
          <p>Le Chef du Service Scolarité</p>
          <div style="border-top:1px solid #000; width:200px; margin-top:5px; margin-left:auto;"></div>
        </div>
      </div>
    </div>`;
    
    const element = document.createElement('div');
    element.innerHTML = content;
    document.body.appendChild(element);
    
    html2pdf().set({
      margin: 0,
      filename: `Releve_${studentId}_${semester}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(element).save().then(() => {
      document.body.removeChild(element);
    });
  }
</script>
