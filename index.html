<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISET Rosso - Consultation des notes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="container">
    <h1>ISET Rosso</h1>
    <p>Institut Supérieur d'Enseignement Technologique</p>
  </div>
</header>

<div class="main-content">
  <div class="container">
    <div id="annonceContainer" class="annonce-container"></div>

    <div class="result-card">
      <h2 class="section-title">Consulter votre résultat</h2>

      <div class="dept-selector">
        <button class="dept-btn active" data-dept="PPV">PPV</button>
        <button class="dept-btn" data-dept="TC">TC</button>
        <button class="dept-btn" data-dept="GAB">GAB</button>
        <button class="dept-btn" data-dept="GEM">GEM</button>
        <button class="dept-btn" data-dept="PSA">PSA</button>
        <button class="dept-btn" data-dept="STA">STA</button>
      </div>

      <div class="search-box">
        <input type="text" id="studentIdInput" placeholder="Entrez votre numéro d'étudiant...">
        <button id="searchBtn" title="Rechercher"><i class="fas fa-search"></i></button>
      </div>

      <div id="studentResultContainer" style="display:none;"></div>
      <div id="noResultMessage" style="display:none;" class="empty-state">
        <h3>Aucun résultat trouvé</h3>
        <p>Vérifiez votre numéro d'étudiant et le département sélectionné</p>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>© 2026 Institut Supérieur d'Enseignement Technologique de Rosso</p>
</footer>

<script type="module" src="app.js"></script>
</body>
</html>
