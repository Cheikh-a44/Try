<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coordinateur PPV - Gestion des résultats</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --primary: #0077b6;
    --primary-dark: #005f87;
    --primary-light: #caf0f8;
    --secondary: #0096c7;
    --light: #f5f7fa;
    --white: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --shadow: 0 4px 12px rgba(0,0,0,0.1);
    --radius: 10px;
    --transition: all 0.3s ease;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background:var(--light); 
    color:var(--text); 
    line-height:1.4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  header { 
    background:linear-gradient(135deg,var(--primary),var(--secondary)); 
    color:var(--white); 
    padding:1rem; 
    text-align:center; 
  }
  header h1 { font-size:1.8rem; margin-bottom:0.2rem; }
  header p { font-size:0.9rem; opacity:0.9; }
  
  .container { max-width:1200px; margin:0 auto; padding:1rem; flex:1; }
  
  .admin-btn {
    padding:0.6rem 1.2rem;
    background:#f0f0f0;
    color:#333;
    border:1px solid #ccc;
    border-radius:var(--radius);
    font-size:0.9rem;
    font-weight:600;
    cursor:pointer;
    transition:var(--transition);
    margin:0.2rem;
  }
  .admin-btn:hover { background:#e0e0e0; }
  .admin-btn.primary { background:var(--primary); color:white; border-color:var(--primary-dark); }
  .admin-btn.success { background:#d4edda; color:#155724; border-color:#28a745; }
  .admin-btn.danger { background:#f8d7da; color:#721c24; border-color:#dc3545; }
  .admin-btn.warning { background:#fff3cd; color:#856404; border-color:#ffc107; }
  .admin-btn.secondary { background:#e9ecef; border-color:#adb5bd; }
  
  .login-container {
    max-width:400px;
    margin:2rem auto;
    background:white;
    padding:2rem;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  
  .dashboard {
    display: none;
  }
  
  .dashboard.active {
    display: block;
  }
  
  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap:1rem;
    margin:1.5rem 0;
  }
  
  .card {
    background:white;
    border-radius:var(--radius);
    padding:1.5rem;
    box-shadow:var(--shadow);
  }
  
  .card h3 {
    color:var(--primary);
    margin-bottom:1rem;
    display:flex;
    align-items:center;
    gap:0.5rem;
    border-bottom:2px solid var(--primary-light);
    padding-bottom:0.5rem;
  }
  
  .form-group { margin-bottom:1rem; }
  .form-group label { display:block; font-weight:600; margin-bottom:0.2rem; }
  .form-group select, .form-group input {
    width:100%;
    padding:0.6rem;
    border:2px solid var(--primary-light);
    border-radius:var(--radius);
    font-size:0.9rem;
  }
  
  .message {
    padding:0.6rem 0.8rem;
    border-radius:var(--radius);
    margin:0.8rem 0;
    display:none;
  }
  .message.success { background:#d4edda; color:#155724; }
  .message.error { background:#f8d7da; color:#721c24; }
  .message.info { background:#caf0f8; color:#005f87; }
  
  .progress-bar {
    width:100%;
    height:6px;
    background:var(--primary-light);
    border-radius:3px;
    margin:0.8rem 0;
    overflow:hidden;
  }
  .progress-fill {
    height:100%;
    background:var(--primary);
    width:0%;
    transition:width 0.3s ease;
  }
  
  .results-table-container {
    max-height:500px;
    overflow:auto;
    margin-top:1rem;
  }
  
  .results-table {
    width:100%;
    border-collapse:collapse;
    font-size:12px;
  }
  
  .results-table th, .results-table td {
    border:1px solid #ddd;
    padding:6px 4px;
    text-align:center;
  }
  
  .results-table th {
    background:var(--primary-light);
    font-weight:bold;
    position:sticky;
    top:0;
  }
  
  .results-table tr:nth-child(even) { background:#f9f9f9; }
  
  .status-Validé { color:#27ae60; font-weight:bold; }
  .status-NonValidé { color:#e74c3c; font-weight:bold; }
  
  .modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:1000;
    justify-content:center;
    align-items:center;
  }
  
  .modal-content {
    background:white;
    padding:1.5rem;
    border-radius:var(--radius);
    max-width:500px;
    width:90%;
    max-height:80vh;
    overflow-y:auto;
  }
  
  .footer {
    text-align:center;
    padding:1rem;
    color:var(--text-light);
    font-size:0.8rem;
    border-top:1px solid #ddd;
    margin-top:2rem;
  }
  
  .footer a {
    color:var(--primary);
    text-decoration:none;
    margin:0 0.5rem;
  }
  
  @media (max-width:768px) {
    header h1 { font-size:1.5rem; }
    .dashboard-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<header>
  <h1><i class="fas fa-user-shield"></i> Coordinateur PPV</h1>
  <p>Département de Production et Protection Végétales</p>
</header>

<div class="container">
  <!-- Login Form -->
  <div id="loginForm" class="login-container">
    <h2 style="text-align:center; margin-bottom:1.5rem; color:var(--primary);"><i class="fas fa-lock"></i> Connexion</h2>
    <div id="loginMessage" class="message error"></div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="adminPassword" placeholder="••••••••" onkeyup="if(event.key==='Enter') login()">
    </div>
    <button class="admin-btn primary" onclick="login()" style="width:100%;">Se connecter</button>
    <p style="text-align:center; margin-top:1rem;">
      <a href="index.html" style="color:var(--primary); text-decoration:none;"><i class="fas fa-arrow-left"></i> Retour au site</a>
    </p>
  </div>
  
  <!-- Dashboard -->
  <div id="dashboard" class="dashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <h2><i class="fas fa-tachometer-alt"></i> Tableau de bord - PPV</h2>
      <button class="admin-btn danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
    </div>
    
    <div id="dashboardMessage" class="message success"></div>
    
    <div class="dashboard-grid">
      <div class="card">
        <h3><i class="fas fa-users"></i> Résultats des étudiants</h3>
        <div class="form-group">
          <label>Semestre</label>
          <select id="viewSemester">
            <option value="S3">S3</option>
            <option value="S4">S4</option>
          </select>
        </div>
        <button class="admin-btn primary" onclick="loadAllStudents()" style="width:100%; margin-bottom:0.5rem;">
          <i class="fas fa-eye"></i> Afficher les résultats
        </button>
        <button class="admin-btn success" onclick="downloadAllResultsPDF()" style="width:100%;">
          <i class="fas fa-file-pdf"></i> Télécharger PDF
        </button>
      </div>
      
      <div class="card">
        <h3><i class="fas fa-upload"></i> Importer résultats</h3>
        <div class="form-group">
          <label>Semestre</label>
          <select id="importSemester">
            <option value="S3">S3</option>
            <option value="S4">S4</option>
          </select>
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="importType">
            <option value="Examen">Examen</option>
            <option value="Contrôle continu">Contrôle continu</option>
            <option value="Rattrapage">Rattrapage</option>
            <option value="TP">TP</option>
          </select>
        </div>
        <div class="form-group">
          <label>Matière</label>
          <select id="importSubject"></select>
        </div>
        <div class="form-group">
          <label>Fichier</label>
          <input type="file" id="importFile" accept=".xlsx,.xls,.ods,.docx,.pdf">
        </div>
        <button class="admin-btn success" onclick="processImport()" style="width:100%;">
          <i class="fas fa-upload"></i> Importer
        </button>
      </div>
      
      <div class="card">
        <h3><i class="fas fa-bullhorn"></i> Annonce</h3>
        <div class="form-group">
          <label>Texte de l'annonce</label>
          <textarea id="annonceTexte" rows="3" placeholder="Ex: Les résultats du S3 sont disponibles !"></textarea>
        </div>
        <button class="admin-btn warning" onclick="publierAnnonce()" style="width:100%; margin-bottom:0.5rem;">
          <i class="fas fa-bullhorn"></i> Publier (24h)
        </button>
        <button class="admin-btn danger" onclick="supprimerAnnonce()" style="width:100%;">
          <i class="fas fa-trash"></i> Supprimer l'annonce
        </button>
      </div>
      
      <div class="card">
        <h3><i class="fas fa-cog"></i> Gestion</h3>
        <button class="admin-btn secondary" onclick="openChangePasswordModal()" style="width:100%; margin-bottom:0.5rem;">
          <i class="fas fa-key"></i> Changer mot de passe
        </button>
        <button class="admin-btn danger" onclick="showResetDataConfirm()" style="width:100%;">
          <i class="fas fa-database"></i> Supprimer données S3
        </button>
      </div>
    </div>
    
    <!-- Résultats des étudiants -->
    <div class="card" id="resultsCard" style="display:none;">
      <h3><i class="fas fa-list"></i> Résultats - <span id="resultsTitle"></span></h3>
      <div class="results-table-container" id="resultsContainer"></div>
    </div>
  </div>
</div>

<!-- Modal changement mot de passe -->
<div id="changePasswordModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-key"></i> Changer le mot de passe</h3>
    <div id="changePasswordMessage" class="message error"></div>
    <div class="form-group">
      <label>Mot de passe actuel</label>
      <input type="password" id="currentPassword">
    </div>
    <div class="form-group">
      <label>Nouveau mot de passe</label>
      <input type="password" id="newPassword">
    </div>
    <div class="form-group">
      <label>Confirmer</label>
      <input type="password" id="confirmNewPassword">
    </div>
    <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
      <button class="admin-btn success" onclick="changePassword()">Enregistrer</button>
      <button class="admin-btn secondary" onclick="closeChangePasswordModal()">Annuler</button>
    </div>
  </div>
</div>

<footer class="footer">
  <p>© 2026 Département de Production et Protection Végétales | 
    <a href="index.html"><i class="fas fa-home"></i> Accueil</a>
  </p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, remove, get, child, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDnrW6WnmbEFpbWzlW9IGglxAafajt2Kyo",
    authDomain: "iset-b9974.firebaseapp.com",
    projectId: "iset-b9974",
    storageBucket: "iset-b9974.firebasestorage.app",
    messagingSenderId: "1054170284751",
    appId: "1:1054170284751:web:8f02232478430d5ae2adba",
    databaseURL: "https://iset-b9974-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const DEFAULT_CREDENTIALS = {
    PPV: { passwordHash: "13b34364b6022a2cd99414b5a0f9e5c3d86036b2e248b000c0f001e10928a26a" }
  };

  let ADMIN_CREDENTIALS = { ...DEFAULT_CREDENTIALS };
  let currentSemester = 'S3';

  const SUBJECTS_BY_DEPT = {
    PPV: {
      S3: ["Français_s3", "Economie", "I_Agronomie", "I_Horticulture", "Pesticides_agricoles", "Entomologie_et_Nemato", "Science_des_sols", "Science_des_plantes"],
      S4: ["Vulgarisation", "Technique_de_propagation", "Technique_d_irrigation_et_BEC", "Ecophysiologie_et_Biochimie", "Fertilite_du_sol", "Methodes_de_diagnostic", "Malherbologie"]
    }
  };

  const SUBJECTS_WITHOUT_TP = [
    "Anglais", "Anglais_2", "Français", "Français_2", "Français_s3",
    "Math_et_Statistique", "Economie", "Vulgarisation"
  ];

  const MODULES_STRUCTURE = {
    PPV: {
      S3: { M31: { name: "Module 31", credit: 6.0, subjects: ["Français_s3", "Economie"] }, M32: { name: "Module 32", credit: 8.0, subjects: ["I_Agronomie", "I_Horticulture"] }, M33: { name: "Module 33", credit: 8.0, subjects: ["Pesticides_agricoles", "Entomologie_et_Nemato"] }, M34: { name: "Module 34", credit: 8.0, subjects: ["Science_des_sols", "Science_des_plantes"] } },
      S4: { M41: { name: "Module 41", credit: 3.0, subjects: ["Vulgarisation"] }, M42: { name: "Module 42", credit: 7.0, subjects: ["Technique_de_propagation", "Technique_d_irrigation_et_BEC"] }, M43: { name: "Module 43", credit: 7.0, subjects: ["Ecophysiologie_et_Biochimie", "Fertilite_du_sol"] }, M44: { name: "Module 44", credit: 6.0, subjects: ["Methodes_de_diagnostic", "Malherbologie"] } }
    }
  };

  const SUBJECT_CREDITS = {
    PPV: { S3: { "Français_s3": 3.0, "Economie": 3.0, "I_Agronomie": 4.0, "I_Horticulture": 4.0, "Pesticides_agricoles": 4.0, "Entomologie_et_Nemato": 4.0, "Science_des_sols": 4.0, "Science_des_plantes": 4.0 }, S4: { "Vulgarisation": 3.0, "Technique_de_propagation": 4.0, "Technique_d_irrigation_et_BEC": 3.0, "Ecophysiologie_et_Biochimie": 4.0, "Fertilite_du_sol": 3.0, "Methodes_de_diagnostic": 3.0, "Malherbologie": 3.0 } }
  };

  function hasTP(s) { return !SUBJECTS_WITHOUT_TP.includes(s); }
  function cleanSubjectName(s) { return s.replace(/\./g, '_').replace(/\s+/g, '_').replace(/[éèêë]/g, 'e').replace(/[ç]/g, 'c'); }
  function displaySubjectName(s) { return s.replace(/_/g, ' ').replace(/I_/g, 'I.').replace(/et_/g, 'et '); }

  async function hashPassword(p) {
    const msg = new TextEncoder().encode(p);
    const hash = await crypto.subtle.digest('SHA-256', msg);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function loadCredentials() {
    try {
      const snap = await get(child(ref(db), 'admin_credentials'));
      if (snap.exists()) {
        const creds = snap.val();
        ADMIN_CREDENTIALS = { PPV: { ...DEFAULT_CREDENTIALS.PPV, ...(creds.PPV || {}) } };
      }
    } catch (e) { console.error('Erreur credentials:', e); }
  }

  async function saveCredentials() {
    try {
      await set(ref(db, 'admin_credentials'), { PPV: { passwordHash: ADMIN_CREDENTIALS.PPV.passwordHash } });
      return true;
    } catch (e) { return false; }
  }

  function showMessage(elementId, text, type) {
    const el = document.getElementById(elementId);
    el.textContent = text;
    el.className = `message ${type}`;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  function updateSubjectList() {
    const semester = document.getElementById('importSemester').value;
    const type = document.getElementById('importType').value;
    const select = document.getElementById('importSubject');
    select.innerHTML = '<option value="">-- Sélectionner --</option>';
    let subjects = SUBJECTS_BY_DEPT.PPV[semester] || [];
    if (type === 'TP') subjects = subjects.filter(s => hasTP(s));
    subjects.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = displaySubjectName(s);
      select.appendChild(opt);
    });
  }

  document.getElementById('importSemester')?.addEventListener('change', updateSubjectList);
  document.getElementById('importType')?.addEventListener('change', updateSubjectList);

  window.login = async function() {
    const pwd = document.getElementById('adminPassword').value;
    if (!pwd) { showMessage('loginMessage', 'Mot de passe requis', 'error'); return; }
    
    await loadCredentials();
    const hash = await hashPassword(pwd);
    
    if (hash === ADMIN_CREDENTIALS.PPV.passwordHash) {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
      updateSubjectList();
    } else {
      showMessage('loginMessage', 'Mot de passe incorrect', 'error');
    }
  };

  window.logout = function() {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('dashboard').classList.remove('active');
    document.getElementById('adminPassword').value = '';
  };

  window.openChangePasswordModal = function() {
    document.getElementById('changePasswordModal').style.display = 'flex';
    document.getElementById('currentPassword').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmNewPassword').value = '';
  };

  window.closeChangePasswordModal = function() {
    document.getElementById('changePasswordModal').style.display = 'none';
  };

  window.changePassword = async function() {
    const curr = document.getElementById('currentPassword').value;
    const newP = document.getElementById('newPassword').value;
    const conf = document.getElementById('confirmNewPassword').value;
    
    if (!curr || !newP || !conf) { showMessage('changePasswordMessage', 'Tous les champs requis', 'error'); return; }
    if (newP !== conf) { showMessage('changePasswordMessage', 'Mots de passe différents', 'error'); return; }
    if (newP.length < 4) { showMessage('changePasswordMessage', '4 caractères minimum', 'error'); return; }
    
    const currHash = await hashPassword(curr);
    if (currHash !== ADMIN_CREDENTIALS.PPV.passwordHash) {
      showMessage('changePasswordMessage', 'Mot de passe actuel incorrect', 'error');
      return;
    }
    
    ADMIN_CREDENTIALS.PPV.passwordHash = await hashPassword(newP);
    if (await saveCredentials()) {
      showMessage('dashboardMessage', 'Mot de passe changé avec succès', 'success');
      closeChangePasswordModal();
    }
  };

  window.publierAnnonce = async function() {
    const texte = document.getElementById('annonceTexte').value.trim();
    if (!texte) { alert('Texte requis'); return; }
    
    const annonce = { texte, expiration: Date.now() + 86400000, dateCreation: Date.now() };
    await set(ref(db, 'annonces/active'), annonce);
    showMessage('dashboardMessage', 'Annonce publiée (24h)', 'success');
    document.getElementById('annonceTexte').value = '';
  };

  window.supprimerAnnonce = async function() {
    if (!confirm('Supprimer l\'annonce ?')) return;
    await remove(ref(db, 'annonces/active'));
    showMessage('dashboardMessage', 'Annonce supprimée', 'success');
  };

  window.showResetDataConfirm = function() {
    if (!confirm('ATTENTION ! Supprimer TOUTES les données du S3 ? Irréversible.')) return;
    resetAllData();
  };

  async function resetAllData() {
    try {
      const snap = await get(child(ref(db), 'results/PPV/S3'));
      if (!snap.exists()) { showMessage('dashboardMessage', 'Aucune donnée', 'info'); return; }
      
      const students = snap.val();
      for (let id in students) await remove(ref(db, `results/PPV/S3/${id}`));
      showMessage('dashboardMessage', 'Données S3 supprimées', 'success');
    } catch (e) { showMessage('dashboardMessage', 'Erreur suppression', 'error'); }
  }

  function calculateResults(notesBySubject, dept, sem) {
    const modules = MODULES_STRUCTURE[dept]?.[sem];
    if (!modules) return null;
    
    const required = [];
    for (let m in modules) for (let s of modules[m].subjects) if (!required.includes(s)) required.push(s);
    
    const subjAvg = {}, subjStatus = {}, subjSR = {};
    for (let s of required) {
      const notes = notesBySubject[s] || {};
      const exam = notes['Examen'] || 0, cc = notes['Contrôle continu'] || 0, tp = notes['TP'] || 0;
      const ratt = notes['Rattrapage'];
      const useSR = ratt !== undefined && ratt > exam;
      subjSR[s] = useSR;
      const final = useSR ? ratt : exam;
      subjAvg[s] = hasTP(s) ? (tp + cc * 2 + final * 3) / 6 : (cc * 2 + final * 3) / 5;
      subjStatus[s] = subjAvg[s] >= 10 ? 'C' : 'NC';
    }
    
    const modAvg = {}, modStatus = {}, modCredits = {};
    for (let m in modules) {
      let w = 0, c = 0, earned = 0;
      for (let s of modules[m].subjects) {
        const cr = SUBJECT_CREDITS[dept][sem][s] || 3;
        w += (subjAvg[s] || 0) * cr;
        c += cr;
        if (subjStatus[s] === 'C') earned += cr;
      }
      modAvg[m] = c > 0 ? w / c : 0;
      modStatus[m] = modules[m].subjects.every(s => subjStatus[s] === 'C') && modAvg[m] >= 10 ? 'V' : 'NV';
      modCredits[m] = earned;
    }
    
    let totalW = 0, totalC = 0;
    for (let s of required) { const cr = SUBJECT_CREDITS[dept][sem][s] || 3; totalW += (subjAvg[s] || 0) * cr; totalC += cr; }
    const genMoy = totalC > 0 ? totalW / totalC : 0;
    const hasNV = Object.values(modStatus).some(s => s === 'NV');
    const semStatus = hasNV ? 'Non Validé' : (genMoy >= 10 ? 'Validé' : 'Non Validé');
    
    return { genMoy, semStatus, modStatus, modCredits, modAvg, subjAvg, subjStatus };
  }

  window.loadAllStudents = async function() {
    const sem = document.getElementById('viewSemester').value;
    currentSemester = sem;
    
    const container = document.getElementById('resultsContainer');
    container.innerHTML = '<p style="text-align:center;padding:1rem;"><i class="fas fa-spinner fa-spin"></i> Chargement...</p>';
    document.getElementById('resultsCard').style.display = 'block';
    document.getElementById('resultsTitle').textContent = `Semestre ${sem}`;
    
    const snap = await get(child(ref(db), `results/PPV/${sem}`));
    if (!snap.exists()) { container.innerHTML = '<p style="text-align:center;padding:1rem;">Aucun résultat</p>'; return; }
    
    const students = snap.val();
    const results = [];
    
    for (let id in students) {
      const data = students[id];
      let name = '';
      const notes = {};
      for (let k in data) {
        if (data[k].name) name = data[k].name;
        if (!notes[data[k].subject]) notes[data[k].subject] = {};
        notes[data[k].subject][data[k].type] = data[k].grade;
      }
      
      const required = SUBJECTS_BY_DEPT.PPV[sem] || [];
      let complete = true;
      for (let s of required) {
        const hasTPs = hasTP(s);
        if (!notes[s]?.['Examen'] || !notes[s]?.['Contrôle continu'] || (hasTPs && !notes[s]?.['TP'])) {
          complete = false; break;
        }
      }
      
      if (complete) {
        const calc = calculateResults(notes, 'PPV', sem);
        results.push({ id, name, moyenne: calc.genMoy.toFixed(2), status: calc.semStatus });
      } else {
        results.push({ id, name, moyenne: '-', status: 'Incomplet' });
      }
    }
    
    results.sort((a, b) => a.id.localeCompare(b.id));
    
    let html = '<table class="results-table"><thead><tr><th>N°</th><th>Nom et Prénom</th><th>Moyenne</th><th>Statut</th></tr></thead><tbody>';
    for (let r of results) {
      html += `<tr><td>${r.id}</td><td style="text-align:left;">${r.name}</td><td>${r.moyenne}</td><td class="${r.status === 'Validé' ? 'status-Validé' : r.status === 'Non Validé' ? 'status-NonValidé' : ''}">${r.status}</td></tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
    
    window.currentResults = results;
    window.currentSemesterData = sem;
  };

  window.downloadAllResultsPDF = async function() {
    if (!window.currentResults || window.currentResults.length === 0) {
      alert('Aucun résultat à télécharger. Affichez d\'abord les résultats.');
      return;
    }
    
    const sem = window.currentSemesterData || document.getElementById('viewSemester').value;
    const results = window.currentResults;

      <div style="padding:15mm 10mm; font-family:Arial, sans-serif; font-size:11pt;">
        <h2 style="text-align:center;">Résultats PPV - Semestre ${sem}</h2>
        <p style="text-align:center;">Département de Production et Protection Végétales - 2025/2026</p>
        <table style="width:100%; border-collapse:collapse; margin-top:20px; border:1px solid #000;">
          <thead><tr style="background:#caf0f8;"><th style="border:1px solid #000; padding:8px;">N°</th><th style="border:1px solid #000; padding:8px;">Nom et Prénom</th><th style="border:1px solid #000; padding:8px;">Moyenne</th><th style="border:1px solid #000; padding:8px;">Statut</th></tr></thead>
          <tbody>
    `;
    
    for (let r of results) {
      content += `<tr><td style="border:1px solid #000; padding:6px;">${r.id}</td><td style="border:1px solid #000; padding:6px;">${r.name}</td><td style="border:1px solid #000; padding:6px; text-align:center;">${r.moyenne}</td><td style="border:1px solid #000; padding:6px; text-align:center;">${r.status}</td></tr>`;
    }

    html2pdf().set({ margin:[10,5,10,5], filename:`Resultats_PPV_${sem}.pdf` }).from(el).save().then(() => document.body.removeChild(el));
  };

  // Fonctions d'importation (similaires à l'original)
  async function extractTextFromPDF(file) {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(it => it.str).join(' ') + '\n';
    }
    return text;
  }

  async function extractTextFromWord(file) {
    const buf = await file.arrayBuffer();
    const res = await mammoth.extractRawText({ arrayBuffer: buf });
    return res.value;
  }

  function parseTextToData(text) {
    const lines = text.split('\n').filter(l => l.trim());
    const data = [];
    for (let line of lines) {
      if (line.match(/num[eé]ro|nom|prenom|note/i)) continue;
      const match = line.match(/(\d+)\s+([A-Za-zÀ-ÿ\s\-]+?)\s+(\d{1,2}(?:[.,]\d{1,2})?)/);
      if (match) {
        const grade = parseFloat(match[3].replace(',', '.'));
        if (grade >= 0 && grade <= 20) data.push({ NUMERO: match[1].trim(), NOM: match[2].trim(), NOTE: grade });
      }
    }
    return data;
  }

  async function readODSFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        const headers = json[0] || [];
        let numCol = 0, nameCol = 1, gradeCol = 2;
        headers.forEach((h, i) => {
          const hs = String(h).toLowerCase();
          if (hs.includes('num') || hs.includes('n°')) numCol = i;
          if (hs.includes('nom') || hs.includes('prenom')) nameCol = i;
          if (hs.includes('note') || hs.includes('grade')) gradeCol = i;
        });
        const result = [];
        for (let i = 1; i < json.length; i++) {
          const row = json[i];
          if (!row?.length) continue;
          const grade = parseFloat(String(row[gradeCol]).replace(',', '.'));
          if (row[numCol] && !isNaN(grade) && grade >= 0 && grade <= 20) {
            result.push({ NUMERO: String(row[numCol]).trim(), NOM: String(row[nameCol] || '').trim(), NOTE: grade });
          }
        }
        resolve(result);
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });
  }

  async function parseFile(file) {
    const name = file.name.toLowerCase();
    if (name.endsWith('.pdf')) return parseTextToData(await extractTextFromPDF(file));
    if (name.endsWith('.docx')) return parseTextToData(await extractTextFromWord(file));
    if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
          const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
          const result = json.map(r => {
            const keys = Object.keys(r);
            const numKey = keys.find(k => k.toLowerCase().includes('num')) || keys[0];
            const nameKey = keys.find(k => k.toLowerCase().includes('nom')) || keys[1];
            const gradeKey = keys.find(k => k.toLowerCase().includes('note')) || keys[2];
            return { NUMERO: String(r[numKey]).trim(), NOM: String(r[nameKey] || '').trim(), NOTE: parseFloat(String(r[gradeKey]).replace(',', '.')) };
          }).filter(r => r.NUMERO && !isNaN(r.NOTE) && r.NOTE >= 0 && r.NOTE <= 20);
          resolve(result);
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }
    if (name.endsWith('.ods')) return readODSFile(file);
    throw new Error('Format non supporté');
  }

  window.processImport = async function() {
    const sem = document.getElementById('importSemester').value;
    const type = document.getElementById('importType').value;
    const subject = document.getElementById('importSubject').value;
    const file = document.getElementById('importFile').files[0];
    
    if (!sem || !subject || !file) { alert('Tous les champs requis'); return; }
    
    const cleanSubj = cleanSubjectName(subject);
    if (type === 'TP' && !hasTP(subject)) { alert('Cette matière n\'a pas de TP'); return; }
    
    showMessage('dashboardMessage', 'Importation en cours...', 'info');
    
    try {
      const snap = await get(child(ref(db), `results/PPV/${sem}`));
      const existing = new Set();
      if (snap.exists()) {
        const students = snap.val();
        for (let id in students) if (students[id][`${cleanSubj}_${type}`]) existing.add(id);
      }
      
      const data = await parseFile(file);
      const updates = {};
      let imported = 0, duplicates = 0, errors = 0;
      
      for (let row of data) {
        const id = row.NUMERO;
        if (!id) { errors++; continue; }
        if (existing.has(id)) { duplicates++; continue; }
        
        updates[`results/PPV/${sem}/${id}/${cleanSubj}_${type}`] = {
          grade: row.NOTE, name: row.NOM, subject, type, dateAdded: Date.now()
        };
        imported++;
        existing.add(id);
      }
      
      if (Object.keys(updates).length > 0) await update(ref(db), updates);
      
      let msg = `${imported} étudiants ajoutés`;
      if (duplicates) msg += `, ${duplicates} ignorés`;
      if (errors) msg += `, ${errors} erreurs`;
      showMessage('dashboardMessage', msg, 'success');
      document.getElementById('importFile').value = '';
      
    } catch (e) {
      showMessage('dashboardMessage', 'Erreur importation', 'error');
    }
  };

  // Initialisation
  loadCredentials();
  updateSubjectList();
</script>
